<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#0d0d10" />
<title>easypos</title>
<link rel="icon" type="image/png" href="icon.png" />
<link rel="apple-touch-icon" href="icon.png" />
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@500;600;700;800&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{--bg:#0d0d10;--card:#1a1a1f;--soft:#23232a;--ink:#f3f0e9;--muted:#8d8d96;--line:#2e2e36;--gold:#e6b450;--gold2:#d89b2e;--ok:#34d164;--err:#ff5a4d;--r:16px;}
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{background:radial-gradient(135% 90% at 50% -10%,#1c1c22 0%,#0c0c0f 55%) fixed;color:var(--ink);font-family:'Outfit',system-ui,sans-serif;-webkit-font-smoothing:antialiased;display:flex;align-items:flex-start;justify-content:center;padding:max(18px,env(safe-area-inset-top)) 16px 44px;min-height:100dvh;}
  .wrap{width:100%;max-width:480px;margin-top:1vh}
  .appbar{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:18px}
  .logo-wordmark{height:34px;width:auto;display:block}
  .wmtext{font-family:'Bricolage Grotesque',sans-serif}
  .langbar{display:flex;gap:6px}
  .langbar button{background:var(--soft);color:var(--muted);border-radius:9px;padding:7px 11px;font-size:13px;font-weight:700;border:none;cursor:pointer}
  .langbar button.on{background:linear-gradient(180deg,var(--gold),var(--gold2));color:#1a1a1e}
  .gear{background:var(--soft);color:var(--gold);border-radius:10px;width:38px;height:38px;display:grid;place-items:center;flex:none}
  .gear:active{transform:translateY(1px)}
  .gear.on{background:linear-gradient(180deg,var(--gold),var(--gold2));color:#1a1a1e}
  .permgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
  .card{background:var(--card);border:1px solid #23232b;border-radius:var(--r);padding:20px 16px;margin-bottom:16px;box-shadow:0 10px 30px rgba(0,0,0,.35)}
  h1{font-family:'Bricolage Grotesque',sans-serif;font-weight:700;font-size:24px;margin-bottom:4px}
  .sub{color:var(--muted);font-size:14px;margin-bottom:18px}
  label{display:block;font-size:13px;font-weight:600;color:var(--muted);margin:14px 0 6px}
  input,select{width:100%;padding:13px 14px;border:none;border-radius:11px;font:inherit;font-size:16px;background:var(--soft);color:var(--ink);outline:none;-webkit-appearance:none;appearance:none}
  input:focus,select:focus{box-shadow:0 0 0 3px rgba(230,180,80,.32)}
  input::placeholder{color:#6b6b73}
  select{background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='12' height='8' viewBox='0 0 12 8'><path d='M1 1l5 5 5-5' stroke='%238d8d96' stroke-width='2' fill='none' stroke-linecap='round'/></svg>");background-repeat:no-repeat;background-position:right 14px center;padding-right:34px}
  button{font:inherit;cursor:pointer;border:none}
  .btn{width:100%;margin-top:18px;padding:15px;border-radius:13px;background:linear-gradient(180deg,var(--gold),var(--gold2));color:#1a1a1e;font-weight:800;font-size:17px;box-shadow:0 8px 22px rgba(230,180,80,.26)}
  .btn:active{opacity:.9;transform:translateY(1px)}.btn:disabled{opacity:.4;box-shadow:none}
  .btn.ok{background:linear-gradient(180deg,#34d164,#23b551);color:#08210f;box-shadow:0 8px 22px rgba(52,209,100,.26)}
  .btn.ghost{background:var(--soft);color:var(--gold);width:auto;margin:0;padding:9px 14px;font-size:15px;font-weight:700;border-radius:10px;box-shadow:none}
  .btn.sm{width:auto;margin:0;padding:13px 16px;font-size:15px;border-radius:11px;flex:none}
  .msg{margin-top:14px;font-size:14px;padding:11px 13px;border-radius:11px;display:none}
  .msg.show{display:block}.msg.err{background:rgba(255,90,77,.16);color:var(--err)}.msg.ok{background:rgba(52,209,100,.16);color:var(--ok)}
  .hidden{display:none!important}
  .top{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;gap:12px}
  .who{font-size:13px;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .who b{color:var(--ink);font-weight:700}
  .seg{display:flex;background:#15151a;border:1px solid #2a2a32;border-radius:13px;padding:4px;margin:14px 0 2px}
  .seg button{flex:1;padding:10px 2px;border-radius:10px;background:transparent;color:var(--muted);font-weight:700;font-size:13px}
  .seg button.on{background:linear-gradient(180deg,var(--gold),var(--gold2));color:#1a1a1e}
  #pmChange{color:var(--ok)}
  .dropdown{position:absolute;top:calc(100% + 6px);right:4px;background:var(--card);border:1px solid var(--line);border-radius:12px;padding:6px;box-shadow:0 14px 34px rgba(0,0,0,.55);z-index:40;min-width:150px;display:flex;flex-direction:column;gap:4px}
  .dropdown button{text-align:left;background:transparent;color:var(--ink);font-weight:700;font-size:15px;padding:12px;border-radius:9px}
  .dropdown button:active{background:var(--soft)}
  .dropdown button.on{color:var(--gold);background:rgba(230,180,80,.12)}
  .tgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
  .ttile{background:var(--soft);border:1px solid var(--line);border-radius:14px;padding:22px 10px;font-size:21px;font-weight:800;color:var(--ink);text-align:center}
  .ttile:active{background:rgba(230,180,80,.16);border-color:var(--gold);color:var(--gold)}
  .collapse-h{display:flex;align-items:center;gap:8px;cursor:pointer;font-weight:700;font-size:15px;color:var(--ink);padding:13px 14px;background:var(--soft);border-radius:11px;margin:6px 0 12px}
  .collapse-h .cnt{color:var(--gold);font-weight:800}
  .collapse-h .chev2{margin-left:auto;color:var(--muted);transition:transform .15s}
  .collapse-h.open .chev2{transform:rotate(180deg)}
  .rline-r{display:flex;gap:12px;align-items:center;white-space:nowrap}
  .voidbtn{color:var(--err);font-weight:700;cursor:pointer;font-size:13px}
  #rsNote{width:100%;padding:12px 13px;border:none;border-radius:11px;background:var(--soft);color:var(--ink);font:inherit;font-size:16px;min-height:70px;resize:vertical;-webkit-appearance:none;outline:none}
  #rsNote:focus{box-shadow:0 0 0 3px rgba(230,180,80,.32)}
  .subseg{display:flex;gap:8px;margin:0 0 16px}
  .subseg button{flex:1;padding:9px;border-radius:10px;background:var(--soft);color:var(--muted);font-weight:700;font-size:14px}
  .subseg button.on{background:rgba(230,180,80,.16);color:var(--gold);box-shadow:inset 0 0 0 1px var(--gold)}
  .today{font-size:13px;color:var(--muted);margin:12px 2px 12px;font-weight:600}
  .today b{color:var(--gold);font-weight:800}
  .section-t{font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin:16px 0 10px;padding:0 2px}
  .filter{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:12px}
  .fchip{background:var(--soft);border-radius:999px;padding:7px 14px;font-size:13px;font-weight:700;color:var(--muted)}
  .fchip.on{background:linear-gradient(180deg,var(--gold),var(--gold2));color:#1a1a1e}
  .grid-prod{display:grid;grid-template-columns:1fr 1fr;gap:9px}
  .tile{background:linear-gradient(180deg,#26262e,#1c1c22);border:1px solid #30303a;border-radius:13px;padding:9px 12px;text-align:left;display:flex;flex-direction:column;gap:3px;min-height:0;justify-content:center;color:var(--ink);width:100%;box-shadow:0 4px 12px rgba(0,0,0,.32)}
  .tile:active{transform:scale(.97)}
  .tile .tn{font-weight:700;font-size:14px;line-height:1.2}
  .tile .tp{font-weight:800;font-size:13px;color:var(--gold)}
  .cart-line{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--line)}
  .cart-line .cn{flex:1;font-size:15px;font-weight:600}
  .cart-line .copt{font-size:12px;color:var(--muted);margin-top:2px;font-weight:500}
  .cart-line .lt{font-weight:800;min-width:60px;text-align:right;font-size:15px}
  .stepper{display:flex;align-items:center;background:var(--soft);border-radius:10px;overflow:hidden}
  .stepper button{width:32px;height:32px;background:transparent;color:var(--gold);font-size:19px;font-weight:800}
  .stepper .q{min-width:28px;text-align:center;font-weight:700}
  .total-row{display:flex;justify-content:space-between;align-items:center;margin-top:16px}
  .total-row span{color:var(--muted);font-size:15px;font-weight:600}
  .total-row b{font-size:27px;font-weight:800}
  #changeOut{color:var(--ok)}
  .chips{display:flex;flex-wrap:wrap;gap:8px}
  .chip{background:var(--soft);border-radius:999px;padding:7px 13px;font-size:14px;font-weight:700;display:inline-flex;gap:8px}
  .chip .x{color:var(--muted);font-weight:700;cursor:pointer}
  .row-add{display:flex;gap:8px}.row-add input{flex:1}
  .row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .chkrow{display:flex;align-items:center;gap:8px;background:var(--soft);border-radius:11px;padding:13px 14px;font-weight:600;color:var(--ink);font-size:15px;margin:0}
  .chkrow input{-webkit-appearance:auto;appearance:auto;width:22px;height:22px;min-width:22px;padding:0;accent-color:var(--gold);flex:none;box-shadow:none}
  input[type=checkbox]{-webkit-appearance:auto;appearance:auto;accent-color:var(--gold)}
  .item{display:flex;align-items:center;gap:12px;padding:12px 13px;border-radius:12px;background:var(--soft)}
  .iteminfo{flex:1;cursor:pointer}
  .item .nm{font-weight:700;font-size:16px}.item .meta{font-size:13px;color:var(--muted);margin-top:1px}
  .item .pr{font-weight:800;white-space:nowrap;color:var(--gold)}.item .x{color:var(--muted);font-weight:700;cursor:pointer;padding-left:6px}
  .pwrap{margin-bottom:8px}
  .attach{display:flex;flex-wrap:wrap;gap:6px;padding:10px 4px 2px}
  .attlbl{flex-basis:100%;font-size:12px;color:var(--muted);font-weight:700;margin-bottom:2px}
  .gchip{background:#2a2a32;border:1px solid #34343c;border-radius:999px;padding:6px 11px;font-size:13px;font-weight:600;color:var(--muted);cursor:pointer}
  .gchip.on{background:rgba(230,180,80,.18);border-color:var(--gold);color:var(--gold)}
  .mgroup{background:var(--soft);border-radius:12px;padding:12px;margin-bottom:10px}
  .mghead{display:flex;align-items:center;gap:8px;margin-bottom:6px}
  .mghead b{font-weight:700}.mghead .meta{font-size:12px;color:var(--muted)}.mghead .x{margin-left:auto;color:var(--muted);cursor:pointer;font-weight:700}
  .opt{display:flex;align-items:center;gap:8px;padding:5px 0;font-size:14px}
  .opt .od{color:var(--gold);font-weight:700;margin-left:auto}.opt .x{color:var(--muted);cursor:pointer;padding-left:8px}
  .miniadd{display:flex;gap:6px;margin-top:8px}
  .miniadd .pn{flex:1}.miniadd .pp{width:84px}
  .miniadd input{padding:10px 11px;font-size:14px}
  .empty{color:var(--muted);font-size:14px;padding:14px;border:1px dashed var(--line);border-radius:12px;text-align:center}
  .order{background:var(--soft);border-radius:12px;margin-bottom:8px;overflow:hidden}
  .ohead{display:flex;align-items:center;justify-content:space-between;padding:12px 13px;cursor:pointer;gap:10px}
  .ohead .nm{font-weight:800;font-size:16px;color:var(--gold)}.ohead .meta{font-size:12px;color:var(--muted);margin-top:1px}
  .chev{color:var(--muted);font-size:13px}
  .odetail{padding:0 13px 13px}
  .rcpt{background:#15151a;border-radius:11px;padding:14px}
  .rtitle{font-weight:800;text-align:center;font-size:15px}.rmeta{text-align:center;color:var(--muted);font-size:12px;margin-bottom:10px}
  .rline{display:flex;justify-content:space-between;font-size:14px;padding:3px 0;gap:10px}
  .rtot{font-weight:800;border-top:1px solid var(--line);margin-top:6px;padding-top:8px}
  .rnote{margin-top:10px;text-align:center;color:var(--muted);font-size:11px}
  details{margin-top:10px;border-top:1px solid var(--line);padding-top:8px}
  summary{color:var(--gold);font-size:14px;font-weight:700;cursor:pointer;padding:8px 0;list-style:none}
  summary::-webkit-details-marker{display:none}
  .cfgwarn{background:rgba(255,90,77,.16);color:var(--err);padding:14px;border-radius:12px;font-size:14px;line-height:1.5}
  .rsum{background:var(--soft);border-radius:14px;padding:16px}
  .rsum .big{font-size:30px;font-weight:800;color:var(--gold)}
  .rsum .big span{font-size:15px;color:var(--muted);font-weight:600;margin-left:8px}
  .rsum .split{display:flex;gap:10px;margin-top:12px}
  .rsum .cell{flex:1;background:#15151a;border-radius:11px;padding:11px 12px}
  .rsum .cell .k{font-size:12px;color:var(--muted);font-weight:700}
  .rsum .cell .v{font-size:18px;font-weight:800;margin-top:2px}
  .rsum .avg{margin-top:12px;font-size:14px;color:var(--muted);font-weight:600}
  .rsum .avg b{color:var(--ink)}
  .modal{position:fixed;inset:0;background:rgba(0,0,0,.6);display:flex;align-items:flex-end;justify-content:center;z-index:50}
  .sheet{background:var(--card);width:100%;max-width:480px;border-radius:20px 20px 0 0;padding:20px 16px calc(20px + env(safe-area-inset-bottom));max-height:86vh;overflow:auto}
  .sheet-h{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
  .sheet-h b{font-size:19px;font-weight:800}.sheet-h .x{color:var(--muted);font-size:22px;cursor:pointer}
  .og{margin-top:14px}.og .gt{font-size:13px;font-weight:700;color:var(--muted);margin-bottom:8px}.og .gt .req{color:var(--err)}
  .optrow{display:flex;align-items:center;gap:10px;padding:12px 13px;border:1px solid var(--line);border-radius:11px;margin-bottom:7px;cursor:pointer}
  .optrow .od{margin-left:auto;color:var(--gold);font-weight:700}
  .optrow .ck{width:20px;height:20px;border-radius:50%;border:2px solid var(--line);flex:none;display:grid;place-items:center;font-size:12px;font-weight:800;color:#1a1a1e}
  .optrow.sel{border-color:var(--gold);background:rgba(230,180,80,.10)}
  .optrow.sel .ck{background:var(--gold);border-color:var(--gold)}
  .optrow.sel .ck::after{content:"✓"}
</style>
</head>
<body>
<div class="wrap">

  <div class="appbar">
    <img class="logo-wordmark" src="wordmark.png" alt="easypos" />
    <div style="display:flex;align-items:center;gap:10px;position:relative">
      <button id="gearBtn" class="gear hidden" aria-label="admin"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg></button>
      <div class="langbar"><button data-lang="zh">中</button><button data-lang="en">EN</button><button data-lang="it">IT</button></div>
      <div id="adminMenu" class="dropdown hidden"><button data-go="report" data-i18n="tab_report">汇总</button><button data-go="menu" data-i18n="menu_settings">菜单设置</button><button data-go="settings" data-i18n="tab_settings">设置</button></div>
    </div>
  </div>

  <div class="card hidden" id="cfgView"><div class="cfgwarn" data-i18n="cfg_warn">还没读到 Supabase 配置。</div></div>

  <div class="card hidden" id="loginView">
    <h1 data-i18n="login_title">登录</h1><div class="sub" data-i18n="login_sub">用你在 Supabase 建的账户登录</div>
    <label data-i18n="email">邮箱</label><input id="email" type="email" autocomplete="username" placeholder="you@example.com" />
    <label data-i18n="password">密码</label><input id="password" type="password" autocomplete="current-password" placeholder="••••••••" />
    <button class="btn" id="loginBtn" data-i18n="login_btn">登录</button>
    <div class="msg err" id="loginMsg"></div>
  </div>

  <div class="card hidden" id="userSelectView">
    <h1 data-i18n="staff_login">登录</h1><div class="sub" data-i18n="staff_login_sub">输入用户名和 PIN(老板用管理 PIN)</div>
    <label data-i18n="user_name">用户名</label><input id="suName" autocomplete="off" data-ph="user_name_ph" placeholder="如:张三" />
    <label data-i18n="pin_word">PIN</label><input id="suPin" type="password" inputmode="numeric" autocomplete="off" placeholder="••••" />
    <button class="btn" id="suLogin" data-i18n="login_btn">登录</button>
    <div class="msg err" id="suMsg"></div>
    <button class="btn ghost" id="ownerLoginToggle" style="width:100%;margin-top:16px;text-align:center" data-i18n="owner_login">店主登录</button>
    <div id="ownerBox" class="hidden">
      <label data-i18n="account_pw">账号密码</label><input id="ownerPw" type="password" autocomplete="current-password" placeholder="••••••••" />
      <button class="btn" id="ownerLoginBtn" data-i18n="login_btn">登录</button>
      <div class="msg err" id="ownerMsg"></div>
    </div>
  </div>

  <div class="card hidden" id="appView">
    <div id="userBar" class="hidden" style="font-size:13px;color:var(--muted);margin-bottom:10px"><span data-i18n="cur_user">当前</span>: <b id="curUserName" style="color:var(--ink)"></b></div>
    <div class="seg"><button id="tabSell" class="on" data-i18n="tab_sell">收银</button><button id="tabDine" data-i18n="tab_dine">点菜</button><button id="tabOrders" data-i18n="tab_orders">订单</button></div>

    <div id="sellTab">
      <div class="today" id="today"></div>
      <div id="openBlock2" class="hidden">
        <div class="collapse-h" id="openHdr2"><span data-i18n="open_tables">开着的桌</span><span class="cnt" id="openCount2"></span><span class="chev2">▾</span></div>
        <div id="openTables2" class="hidden"></div>
      </div>
    </div>

    <div id="dineTab" class="hidden">
      <div id="openBlock" class="hidden">
        <div class="collapse-h" id="openHdr"><span data-i18n="open_tables">开着的桌</span><span class="cnt" id="openCount"></span><span class="chev2">▾</span></div>
        <div id="openTables" class="hidden"></div>
      </div>
      <div class="section-t" style="display:flex;align-items:center;justify-content:space-between;gap:8px">
        <span data-i18n="new_order">新点单</span>
        <button id="cartJump" class="hidden" style="display:inline-flex;align-items:center;gap:6px;background:var(--gold);color:#1a1205;border:none;border-radius:999px;padding:6px 13px;font-weight:800;font-size:13px;text-transform:none;letter-spacing:0;cursor:pointer">🛒 <span id="cartJumpN">0</span></button>
      </div>
      <div id="addBanner" class="hidden" style="background:rgba(230,180,80,.16);color:var(--gold);font-weight:700;padding:10px 12px;border-radius:10px;margin-bottom:12px;font-size:14px"></div>
      <input id="prodSearch" data-ph="search_ph" placeholder="搜索菜品…" autocomplete="off" style="margin-bottom:10px" />
      <div class="filter" id="catFilter2"></div>
      <div class="grid-prod" id="prodGrid2"></div>
      <div class="section-t" id="cartAnchor" data-i18n="cart">购物车</div>
      <div id="cart2"></div>
      <div class="total-row"><span data-i18n="total">合计</span><b id="cartTotal2">€0.00</b></div>
      <div id="dineActions">
        <div id="coverRow" class="hidden" style="display:flex;align-items:center;gap:12px;margin-bottom:12px">
          <span style="color:var(--muted);font-size:14px;font-weight:600" data-i18n="covers_label">人数</span>
          <span class="stepper"><button id="coverMinus" type="button">−</button><span class="q" id="coverN">1</span><button id="coverPlus" type="button">+</button></span>
          <span style="color:var(--gold);font-size:13px;font-weight:700" id="copertoHint"></span>

  async function loadReport(){
    const sid=storeId();
    if(!$("repDate").value)setRepToday();
    if(!sid){ $("repSummary").innerHTML=`<div class="empty">${t("need_store")}</div>`; $("repItems").innerHTML=""; reportRows=[];reportItems=[]; return; }
    const ds=$("repDate").value.split("-").map(Number);
    const start=new Date(ds[0],ds[1]-1,ds[2],0,0,0,0), end=new Date(ds[0],ds[1]-1,ds[2]+1,0,0,0,0);
    const {data,error}=await sb.from("orders").select("*, order_items(*)").eq("store_id",sid).gte("created_at",start.toISOString()).lt("created_at",end.toISOString()).order("created_at");
    if(error){ $("repSummary").innerHTML=`<div class="empty">${esc(error.message)}</div>`; $("repItems").innerHTML=""; return; }
    const orders=data||[]; reportRows=orders;
    let total=0,cashAmt=0,cashN=0,cardAmt=0,cardN=0; const itemMap={};
    orders.forEach(o=>{
      total+=Number(o.total);
      if(o.payment_method==="card"){cardAmt+=Number(o.total);cardN++;} else {cashAmt+=Number(o.total);cashN++;}
      (o.order_items||[]).forEach(i=>{ const key=i.name+(i.options_text?(" · "+i.options_text):""); if(!itemMap[key])itemMap[key]={name:key,qty:0,rev:0}; itemMap[key].qty+=Number(i.qty); itemMap[key].rev+=Number(i.line_total); });

      <div class="split"><div class="cell"><div class="k">${t("pay_cash")}</div><div class="v">${money(cashAmt)}</div><div class="k">${cashN} ${t("orders_unit")}</div></div>

    $("repItems").innerHTML=reportItems.length?reportItems.map(it=>`<div class="item"><div class="iteminfo"><div class="nm">${esc(it.name)}</div><div class="meta">×${it.qty}</div></div><div class="pr">${money(it.rev)}</div></div>`).join(""):`<div class="empty">${t("no_data")}</div>`;

  function toCSV(rows){ return "\uFEFF"+rows.map(r=>r.map(csvCell).join(";")).join("\r\n"); }
  function amtIt(n){ return Number(n||0).toFixed(2).replace(".",","); }
  async function shareCSV(name,csv){
    const blob=new Blob([csv],{type:"text/csv;charset=utf-8"});
    try{ const file=new File([blob],name,{type:"text/csv"}); if(navigator.canShare&&navigator.canShare({files:[file]})){ await navigator.share({files:[file],title:name}); return; } }catch(e){ if(e&&e.name==="AbortError")return; }
    const url=URL.createObjectURL(blob); const a=document.createElement("a"); a.href=url; a.download=name; document.body.appendChild(a); a.click(); a.remove(); setTimeout(()=>URL.revokeObjectURL(url),1500);
  }

  async function openTableWith(tableId){
    const tname=(tables.find(x=>x.id===tableId)||{}).name||"";
    const existing=occupantOrder(tableId);
    if(existing){
      if(!confirm(t("table_word")+" "+tname+" "+t("already_open_confirm"))) return;
      const items=cart.map(l=>({order_id:existing.id,product_id:l.product_id,name:l.name,price:l.price,qty:l.qty,line_total:+(l.price*l.qty).toFixed(2),options_text:l.options_text||null}));
      const {error}=await sb.from("order_items").insert(items);
      if(error){ alert(t("fail")+error.message); return; }
      const added=cart.reduce((s,l)=>s+l.price*l.qty,0);
      await sb.from("orders").update({total:+(Number(existing.total||0)+added).toFixed(2)}).eq("id",existing.id);
      cart=[]; renderCart(); $("tblPickModal").classList.add("hidden"); loadOpenTables();
      return;
    }
    const cop=copertoPrice();
    const cov=cop>0?coverCount():0;
    const copTotal=(cop>0&&cov>0)?+(cop*cov).toFixed(2):0;
    const total=cartTotal()+copTotal;
    const {data:order,error}=await sb.from("orders").insert({store_id:storeId(),order_type:"dine",status:"open",table_id:tableId,total:+total.toFixed(2)}).select().single();
    if(error){ alert(t("fail")+error.message); return; }
    const items=cart.map(l=>({order_id:order.id,product_id:l.product_id,name:l.name,price:l.price,qty:l.qty,line_total:+(l.price*l.qty).toFixed(2),options_text:l.options_text||null}));
    if(copTotal>0)items.unshift({order_id:order.id,product_id:null,name:t("coperto_word"),price:cop,qty:cov,line_total:copTotal,options_text:null});
    const {error:e2}=await sb.from("order_items").insert(items);
    if(e2){ alert(t("fail")+e2.message); return; }
    cart=[]; $("coverN").textContent="1"; updateCoverHint(); renderCart(); $("tblPickModal").classList.add("hidden"); loadOpenTables();
  }

  let aaN=1, aaIdx=0, aaShares=[], aaDone=[];
  let discMode="none", discVal=0;
  function discAmount(){ const g=Number(payCtx&&payCtx.total)||0; if(discMode==="amt")return Math.min(g,Math.max(0,Number(discVal)||0)); if(discMode==="pct"){ const p=Math.min(100,Math.max(0,Number(discVal)||0)); return +(g*p/100).toFixed(2); } return 0; }
  function effTotal(){ return +(Number(payCtx.total)-discAmount()).toFixed(2); }
  function computeShares(total,n){ const cents=Math.round(Number(total)*100); const base=Math.floor(cents/n); const arr=Array(n).fill(base); arr[n-1]+=cents-base*n; return arr.map(c=>c/100); }
  function curDue(){ return (aaN>1 && aaShares.length) ? aaShares[Math.min(aaIdx,aaShares.length-1)] : effTotal(); }
  function recalcShares(){ if(aaN>1)aaShares=computeShares(effTotal(),aaN); }
  function renderPmAa(){
    $("pmAaN").textContent=aaN;
    const multi=aaN>1;
    $("pmPersonRow").classList.toggle("hidden",!multi);
    if(multi)$("pmPersonRow").textContent=t("aa_person",{k:aaIdx+1,n:aaN,m:money(curDue())});
    $("pmDiscShow").textContent="−"+money(discAmount());
    $("pmTotal").textContent=money(effTotal());
    const ci=parseFloat($("pmCashInput").value);
    $("pmChange").textContent=money(isNaN(ci)?0:Math.max(0,ci-curDue()));
    const remaining=multi?(aaN-aaDone.length):1;
    $("pmConfirm").textContent=(multi&&remaining>1)?t("aa_collect_next"):t("finish");
  }
  function setDisc(mode){ if(aaDone.length>0)return; discMode=mode; $("pmDiscOff").classList.toggle("on",mode==="none"); $("pmDiscAmtBtn").classList.toggle("on",mode==="amt"); $("pmDiscPctBtn").classList.toggle("on",mode==="pct"); $("pmDiscInput").classList.toggle("hidden",mode==="none"); if(mode==="none"){ discVal=0; $("pmDiscInput").value=""; } recalcShares(); renderPmAa(); }
  $("pmDiscOff").onclick=()=>setDisc("none"); $("pmDiscAmtBtn").onclick=()=>setDisc("amt"); $("pmDiscPctBtn").onclick=()=>setDisc("pct");
  $("pmDiscInput").oninput=()=>{ if(aaDone.length>0)return; discVal=parseFloat($("pmDiscInput").value)||0; recalcShares(); renderPmAa(); };
  $("pmAaPlus").onclick=()=>{ if(aaDone.length>0)return; aaN++; aaShares=computeShares(effTotal(),aaN); aaIdx=0; setPm("cash"); $("pmCashInput").value=""; renderPmAa(); };
  $("pmAaMinus").onclick=()=>{ if(aaDone.length>0||aaN<=1)return; aaN--; aaShares=aaN>1?computeShares(effTotal(),aaN):[]; aaIdx=0; setPm("cash"); $("pmCashInput").value=""; renderPmAa(); };
  $("pmCashInput").oninput=()=>{ const ch=parseFloat($("pmCashInput").value)-curDue(); $("pmChange").textContent=money(isNaN(ch)?0:Math.max(0,ch)); };
  function openPay(ctx){ payCtx=ctx; aaN=1; aaIdx=0; aaShares=[]; aaDone=[]; discMode="none"; discVal=0; $("pmDiscInput").value=""; $("pmDiscBox").classList.toggle("hidden",!can('discount')); setDisc("none"); setPm("cash"); $("pmCashInput").value=""; $("pmAaMinus").disabled=false; $("pmAaPlus").disabled=false; hide($("pmMsg")); renderPmAa(); $("payModal").classList.remove("hidden"); }

  async function insertCompleted(total,method,cash,change,tableId,items){
    const type=(payCtx.source==="quick")?"quick":"dine";
    const {data:order,error}=await sb.from("orders").insert({store_id:storeId(),order_type:type,status:"completed",table_id:tableId||null,total:+Number(total).toFixed(2),payment_method:method,cash_received:cash,change_given:change}).select().single();
    if(error)return error;
    if(items&&items.length){
      const rows=items.map(l=>({order_id:order.id,product_id:l.product_id,name:l.name,price:l.price,qty:l.qty,line_total:+(l.price*l.qty).toFixed(2),options_text:l.options_text||null}));
      const {error:e2}=await sb.from("order_items").insert(rows); if(e2)return e2;
    }
    return null;
  }
  async function shrinkSource(orderId,items){
    for(const it of items){ const remain=Number(it.origQty)-Number(it.qty);
      if(remain<=0){ await sb.from("order_items").delete().eq("id",it.order_item_id); }
      else { await sb.from("order_items").update({qty:remain,line_total:+(Number(it.price)*remain).toFixed(2)}).eq("id",it.order_item_id); } }
    const {data:rem}=await sb.from("order_items").select("line_total").eq("order_id",orderId);
    if(!rem||!rem.length){ await sb.from("orders").delete().eq("id",orderId); }
    else { const tot=rem.reduce((s,r)=>s+Number(r.line_total),0); await sb.from("orders").update({total:+tot.toFixed(2)}).eq("id",orderId); }
  }
  async function commitAaBatch(){
    const created=[];
    const rollback=async()=>{ for(const id of created){ await sb.from("order_items").delete().eq("order_id",id); await sb.from("orders").delete().eq("id",id); } };
    for(let i=0;i<aaDone.length;i++){ const p=aaDone[i];
      const {data:order,error}=await sb.from("orders").insert({store_id:storeId(),order_type:(payCtx.source==="quick")?"quick":"dine",status:"completed",table_id:payCtx.tableId||null,total:+p.total.toFixed(2),payment_method:p.method,cash_received:p.cash,change_given:p.change}).select().single();
      if(error){ await rollback(); return error; }
      created.push(order.id);
      if(i===0 && payCtx.items && payCtx.items.length){
        const rows=payCtx.items.map(l=>({order_id:order.id,product_id:l.product_id,name:l.name,price:l.price,qty:l.qty,line_total:+(l.price*l.qty).toFixed(2),options_text:l.options_text||null}));
        const {error:e2}=await sb.from("order_items").insert(rows); if(e2){ await rollback(); return e2; }
      }
    }
    if(payCtx.source==="settle"){ await sb.from("order_items").delete().eq("order_id",payCtx.orderId); await sb.from("orders").delete().eq("id",payCtx.orderId); }
    else if(payCtx.source==="split"){ await shrinkSource(payCtx.orderId,payCtx.items); }
    return null;
  }
  async function afterPay(){ const da=discAmount(); if(da>0){ try{ await sb.from("audit_log").insert({store_id:storeId(),action:t("discount_w"),detail:(currentUser?currentUser.name+" · ":"")+money(effTotal()),amount:da}); }catch(e){} } if(payCtx.source==="quick"){ cart=[]; renderCart(); } loadOpenTables(); loadToday(); if(!$("ordersTab").classList.contains("hidden"))loadOrders(); }

  $("pmConfirm").onclick=async()=>{
    hide($("pmMsg")); const b=$("pmConfirm");
    if(aaN>1 && aaDone.length>=aaN){ b.disabled=true; b.textContent=t("saving"); const e=await commitAaBatch(); b.disabled=false; renderPmAa(); if(e){ show($("pmMsg"),t("fail")+e.message,"err"); return; } $("payModal").classList.add("hidden"); afterPay(); return; }
    const due=curDue(); let cash=null,change=null;
    if(pmMethod2==="cash"){ cash=parseFloat($("pmCashInput").value); if(isNaN(cash)||cash<due){ show($("pmMsg"),t("cash_short",{t:money(due)}),"err"); return; } change=+(cash-due).toFixed(2); }
    b.disabled=true; b.textContent=t("saving"); let err=null;
    if(aaN>1){
      aaDone.push({method:pmMethod2,cash,change,total:due});
      $("pmAaMinus").disabled=true; $("pmAaPlus").disabled=true;
      if(aaDone.length<aaN){ aaIdx++; setPm("cash"); $("pmCashInput").value=""; b.disabled=false; renderPmAa(); show($("pmMsg"),t("aa_saved_next",{k:aaDone.length,n:aaN}),"ok"); return; }
      err=await commitAaBatch();
    } else if(payCtx.source==="settle"){
      const r=await sb.from("orders").update({payment_method:pmMethod2,cash_received:cash,change_given:change,status:"completed",total:+due.toFixed(2)}).eq("id",payCtx.orderId); err=r.error;
    } else if(payCtx.source==="split"){
      err=await insertCompleted(due,pmMethod2,cash,change,payCtx.tableId,payCtx.items);
      if(!err)await shrinkSource(payCtx.orderId,payCtx.items);
    } else {
      err=await insertCompleted(due,pmMethod2,cash,change,payCtx.tableId,payCtx.items);
    }
    b.disabled=false; b.textContent=t("finish");
    if(err){ show($("pmMsg"),t("fail")+err.message,"err"); return; }
    $("payModal").classList.add("hidden"); afterPay();
  };

  // ---- 选菜结账(按份数拆) ----
  let splitSel={};
  function spItem(iid){ return ((curOpen&&curOpen.order_items)||[]).find(x=>x.id===iid); }
  function splitSubtotal(){ let s=0; for(const iid in splitSel){ const it=spItem(iid); if(it)s+=Number(it.price)*splitSel[iid]; } return +s.toFixed(2); }
  function updateSplitTotal(){ $("spTotal").textContent=money(splitSubtotal()); }
  function chgSplit(iid,d){ const it=spItem(iid); if(!it)return; let nv=(splitSel[iid]||0)+d; if(nv<0)nv=0; if(nv>Number(it.qty))nv=Number(it.qty); splitSel[iid]=nv; const q=$("spq-"+iid); if(q)q.textContent=nv; updateSplitTotal(); }
  function openSplit(){
    const o=curOpen; if(!o)return; splitSel={}; hide($("spMsg")); $("tblModal").classList.add("hidden");
    $("spItems").innerHTML=(o.order_items||[]).map(i=>`<div class="item" style="margin-bottom:7px"><div class="iteminfo" style="cursor:default"><div class="nm">${esc(i.name)}</div><div class="meta">${i.options_text?esc(i.options_text)+' · ':''}${money(i.price)} ${t("each_word")} · ×${i.qty}</div></div><span class="stepper"><button data-spm="${i.id}">−</button><span class="q" id="spq-${i.id}">0</span><button data-spp="${i.id}">+</button></span></div>`).join("")||`<div class="empty">—</div>`;
    $("spItems").querySelectorAll('[data-spm]').forEach(x=>x.onclick=()=>chgSplit(x.dataset.spm,-1));
    $("spItems").querySelectorAll('[data-spp]').forEach(x=>x.onclick=()=>chgSplit(x.dataset.spp,1));
    updateSplitTotal(); $("splitModal").classList.remove("hidden");
  }
  $("tmSplit").onclick=openSplit;
  $("spClose").onclick=()=>$("splitModal").classList.add("hidden");
  $("splitModal").onclick=(e)=>{ if(e.target===$("splitModal"))$("splitModal").classList.add("hidden"); };
  $("spPay").onclick=()=>{
    hide($("spMsg")); const items=[];
    for(const iid in splitSel){ const q=splitSel[iid]; if(q>0){ const it=spItem(iid); items.push({order_item_id:iid,product_id:it.product_id,name:it.name,price:Number(it.price),qty:q,options_text:it.options_text||null,origQty:Number(it.qty)}); } }
    if(!items.length){ show($("spMsg"),t("pick_some"),"err"); return; }
    const total=splitSubtotal(); $("splitModal").classList.add("hidden");
    openPay({source:"split",orderId:curOpen.id,total,tableId:curOpen.table_id,items});
  };

  // ---- 换桌 / 拼桌 ----
  async function mergeOrders(keep,drop){
    await sb.from("order_items").update({order_id:keep.id}).eq("order_id",drop.id);
    const {data:items}=await sb.from("order_items").select("line_total").eq("order_id",keep.id);
    const tot=(items||[]).reduce((s,r)=>s+Number(r.line_total),0);
    const ex=new Set([...((keep.extra_tables)||[]), drop.table_id, ...((drop.extra_tables)||[])].filter(Boolean));
    ex.delete(keep.table_id);
    await sb.from("orders").update({total:+tot.toFixed(2),extra_tables:[...ex]}).eq("id",keep.id);
    await sb.from("orders").delete().eq("id",drop.id);
  }
  $("mvClose").onclick=()=>$("mvModal").classList.add("hidden");
  $("mvModal").onclick=(e)=>{ if(e.target===$("mvModal"))$("mvModal").classList.add("hidden"); };

  $("tmMove").onclick=()=>{
    const o=curOpen; if(!o)return;
    const own=new Set(orderTableIds(o));
    const occ=occupiedSet();
    const cands=tables.filter(tb=>!own.has(tb.id));
    $("tblModal").classList.add("hidden"); hide($("mvMsg")); $("mvTitle").textContent=t("move_to_title");
    $("mvList").innerHTML=cands.length?cands.map(tb=>{ const busy=occ.has(tb.id);
      return `<button class="ttile" data-mv="${tb.id}" ${busy?'disabled style="opacity:.4;cursor:not-allowed"':''}>${esc(tb.name)}${busy?`<div style="font-size:11px;color:var(--muted);font-weight:600;margin-top:4px">${t("busy_word")}</div>`:""}</button>`; }).join("")
      :`<div class="empty" style="grid-column:1/-1">${t("no_free_table")}</div>`;
    $("mvList").querySelectorAll('[data-mv]:not([disabled])').forEach(c=>c.onclick=()=>doMove(c.dataset.mv));
    $("mvModal").classList.remove("hidden");
  };
  async function doMove(targetId){
    const o=curOpen; if(!o)return;
    const tn=(tables.find(x=>x.id===targetId)||{}).name||"";
    if(!confirm(t("move_confirm",{t:tn})))return;
    const {error}=await sb.from("orders").update({table_id:targetId}).eq("id",o.id);
    if(error){ show($("mvMsg"),t("fail")+error.message,"err"); return; }
    $("mvModal").classList.add("hidden"); loadOpenTables();
  }

  $("tmMerge").onclick=()=>{
    const o=curOpen; if(!o)return;
    const others=openOrders.filter(x=>x.id!==o.id);
    $("tblModal").classList.add("hidden"); hide($("mvMsg")); $("mvTitle").textContent=t("merge_into_title");
    $("mvList").innerHTML=others.length?others.map(ord=>{
      return `<button class="ttile" data-mg="${ord.id}">${esc(tableLabel(ord))}<div style="font-size:11px;color:var(--muted);font-weight:600;margin-top:4px">${money(orderTotal(ord))}</div></button>`; }).join("")
      :`<div class="empty" style="grid-column:1/-1">${t("no_other_open")}</div>`;
    $("mvList").querySelectorAll('[data-mg]').forEach(c=>c.onclick=()=>doMerge(c.dataset.mg));
    $("mvModal").classList.remove("hidden");
  };
  async function doMerge(otherId){
    const o=curOpen; const other=openOrders.find(x=>x.id===otherId); if(!o||!other)return;
    const aName=tableLabel(o), bName=tableLabel(other);
    if(!confirm(t("merge_confirm",{a:aName,b:bName})))return;
    await mergeOrders(o,other);
    $("mvModal").classList.add("hidden"); loadOpenTables();
  }

  render();
</script>
</body>
</html>

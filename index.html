<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#0d0d10" />
<title>easypos</title>
<link rel="icon" type="image/png" href="icon.png" />
<link rel="apple-touch-icon" href="icon.png" />
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@500;600;700;800&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{--bg:#0d0d10;--card:#1a1a1f;--soft:#23232a;--ink:#f3f0e9;--muted:#8d8d96;--line:#2e2e36;--gold:#e6b450;--gold2:#d89b2e;--ok:#34d164;--err:#ff5a4d;--r:16px;}
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{background:radial-gradient(135% 90% at 50% -10%,#1c1c22 0%,#0c0c0f 55%) fixed;color:var(--ink);font-family:'Outfit',system-ui,sans-serif;-webkit-font-smoothing:antialiased;display:flex;align-items:flex-start;justify-content:center;padding:max(18px,env(safe-area-inset-top)) 16px 44px;min-height:100dvh;}
  .wrap{width:100%;max-width:480px;margin-top:1vh}
  .appbar{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:18px}
  .logo-wordmark{height:34px;width:auto;display:block}
  .wmtext{font-family:'Bricolage Grotesque',sans-serif}
  .langbar{display:flex;gap:6px}
  .langbar button{background:var(--soft);color:var(--muted);border-radius:9px;padding:7px 11px;font-size:13px;font-weight:700;border:none;cursor:pointer}
  .langbar button.on{background:linear-gradient(180deg,var(--gold),var(--gold2));color:#1a1a1e}
  .card{background:var(--card);border:1px solid #23232b;border-radius:var(--r);padding:20px 16px;margin-bottom:16px;box-shadow:0 10px 30px rgba(0,0,0,.35)}
  h1{font-family:'Bricolage Grotesque',sans-serif;font-weight:700;font-size:24px;margin-bottom:4px}
  .sub{color:var(--muted);font-size:14px;margin-bottom:18px}
  label{display:block;font-size:13px;font-weight:600;color:var(--muted);margin:14px 0 6px}
  input,select{width:100%;padding:13px 14px;border:none;border-radius:11px;font:inherit;font-size:16px;background:var(--soft);color:var(--ink);outline:none;-webkit-appearance:none;appearance:none}
  input:focus,select:focus{box-shadow:0 0 0 3px rgba(230,180,80,.32)}
  input::placeholder{color:#6b6b73}
  select{background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='12' height='8' viewBox='0 0 12 8'><path d='M1 1l5 5 5-5' stroke='%238d8d96' stroke-width='2' fill='none' stroke-linecap='round'/></svg>");background-repeat:no-repeat;background-position:right 14px center;padding-right:34px}
  button{font:inherit;cursor:pointer;border:none}
  .btn{width:100%;margin-top:18px;padding:15px;border-radius:13px;background:linear-gradient(180deg,var(--gold),var(--gold2));color:#1a1a1e;font-weight:800;font-size:17px;box-shadow:0 8px 22px rgba(230,180,80,.26)}
  .btn:active{opacity:.9;transform:translateY(1px)}.btn:disabled{opacity:.4;box-shadow:none}
  .btn.ok{background:linear-gradient(180deg,#34d164,#23b551);color:#08210f;box-shadow:0 8px 22px rgba(52,209,100,.26)}
  .btn.ghost{background:var(--soft);color:var(--gold);width:auto;margin:0;padding:9px 14px;font-size:15px;font-weight:700;border-radius:10px;box-shadow:none}
  .btn.sm{width:auto;margin:0;padding:13px 16px;font-size:15px;border-radius:11px;flex:none}
  .msg{margin-top:14px;font-size:14px;padding:11px 13px;border-radius:11px;display:none}
  .msg.show{display:block}.msg.err{background:rgba(255,90,77,.16);color:var(--err)}.msg.ok{background:rgba(52,209,100,.16);color:var(--ok)}
  .hidden{display:none!important}
  .top{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;gap:12px}
  .who{font-size:13px;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .who b{color:var(--ink);font-weight:700}
  .seg{display:flex;background:#15151a;border:1px solid #2a2a32;border-radius:13px;padding:4px;margin:14px 0 2px}
  .seg button{flex:1;padding:10px 2px;border-radius:10px;background:transparent;color:var(--muted);font-weight:700;font-size:13px}
  .seg button.on{background:linear-gradient(180deg,var(--gold),var(--gold2));color:#1a1a1e}
  #pmChange{color:var(--ok)}
  .dropdown{position:absolute;top:calc(100% + 6px);right:4px;background:var(--card);border:1px solid var(--line);border-radius:12px;padding:6px;box-shadow:0 14px 34px rgba(0,0,0,.55);z-index:40;min-width:150px;display:flex;flex-direction:column;gap:4px}
  .dropdown button{text-align:left;background:transparent;color:var(--ink);font-weight:700;font-size:15px;padding:12px;border-radius:9px}
  .dropdown button:active{background:var(--soft)}
  .dropdown button.on{color:var(--gold);background:rgba(230,180,80,.12)}
  .subseg{display:flex;gap:8px;margin:0 0 16px}
  .subseg button{flex:1;padding:9px;border-radius:10px;background:var(--soft);color:var(--muted);font-weight:700;font-size:14px}
  .subseg button.on{background:rgba(230,180,80,.16);color:var(--gold);box-shadow:inset 0 0 0 1px var(--gold)}
  .today{font-size:13px;color:var(--muted);margin:12px 2px 12px;font-weight:600}
  .today b{color:var(--gold);font-weight:800}
  .section-t{font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin:16px 0 10px;padding:0 2px}
  .filter{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:12px}
  .fchip{background:var(--soft);border-radius:999px;padding:7px 14px;font-size:13px;font-weight:700;color:var(--muted)}
  .fchip.on{background:linear-gradient(180deg,var(--gold),var(--gold2));color:#1a1a1e}
  .grid-prod{display:grid;grid-template-columns:1fr 1fr;gap:11px}
  .tile{background:linear-gradient(180deg,#26262e,#1c1c22);border:1px solid #30303a;border-radius:15px;padding:14px 13px;text-align:left;display:flex;flex-direction:column;gap:6px;min-height:80px;justify-content:space-between;color:var(--ink);width:100%;box-shadow:0 6px 16px rgba(0,0,0,.35)}
  .tile:active{transform:scale(.97)}
  .tile .tn{font-weight:700;font-size:15px;line-height:1.2}
  .tile .tp{font-weight:800;font-size:16px;color:var(--gold)}
  .cart-line{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--line)}
  .cart-line .cn{flex:1;font-size:15px;font-weight:600}
  .cart-line .copt{font-size:12px;color:var(--muted);margin-top:2px;font-weight:500}
  .cart-line .lt{font-weight:800;min-width:60px;text-align:right;font-size:15px}
  .stepper{display:flex;align-items:center;background:var(--soft);border-radius:10px;overflow:hidden}
  .stepper button{width:32px;height:32px;background:transparent;color:var(--gold);font-size:19px;font-weight:800}
  .stepper .q{min-width:28px;text-align:center;font-weight:700}
  .total-row{display:flex;justify-content:space-between;align-items:center;margin-top:16px}
  .total-row span{color:var(--muted);font-size:15px;font-weight:600}
  .total-row b{font-size:27px;font-weight:800}
  #changeOut{color:var(--ok)}
  .chips{display:flex;flex-wrap:wrap;gap:8px}
  .chip{background:var(--soft);border-radius:999px;padding:7px 13px;font-size:14px;font-weight:700;display:inline-flex;gap:8px}
  .chip .x{color:var(--muted);font-weight:700;cursor:pointer}
  .row-add{display:flex;gap:8px}.row-add input{flex:1}
  .row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .chkrow{display:flex;align-items:center;gap:8px;background:var(--soft);border-radius:11px;padding:13px 14px;font-weight:600;color:var(--ink);font-size:15px;margin:0}
  .chkrow input{-webkit-appearance:auto;appearance:auto;width:22px;height:22px;min-width:22px;padding:0;accent-color:var(--gold);flex:none;box-shadow:none}
  input[type=checkbox]{-webkit-appearance:auto;appearance:auto;accent-color:var(--gold)}
  .item{display:flex;align-items:center;gap:12px;padding:12px 13px;border-radius:12px;background:var(--soft)}
  .iteminfo{flex:1;cursor:pointer}
  .item .nm{font-weight:700;font-size:16px}.item .meta{font-size:13px;color:var(--muted);margin-top:1px}
  .item .pr{font-weight:800;white-space:nowrap;color:var(--gold)}.item .x{color:var(--muted);font-weight:700;cursor:pointer;padding-left:6px}
  .pwrap{margin-bottom:8px}
  .attach{display:flex;flex-wrap:wrap;gap:6px;padding:10px 4px 2px}
  .attlbl{flex-basis:100%;font-size:12px;color:var(--muted);font-weight:700;margin-bottom:2px}
  .gchip{background:#2a2a32;border:1px solid #34343c;border-radius:999px;padding:6px 11px;font-size:13px;font-weight:600;color:var(--muted);cursor:pointer}
  .gchip.on{background:rgba(230,180,80,.18);border-color:var(--gold);color:var(--gold)}
  .mgroup{background:var(--soft);border-radius:12px;padding:12px;margin-bottom:10px}
  .mghead{display:flex;align-items:center;gap:8px;margin-bottom:6px}
  .mghead b{font-weight:700}.mghead .meta{font-size:12px;color:var(--muted)}.mghead .x{margin-left:auto;color:var(--muted);cursor:pointer;font-weight:700}
  .opt{display:flex;align-items:center;gap:8px;padding:5px 0;font-size:14px}
  .opt .od{color:var(--gold);font-weight:700;margin-left:auto}.opt .x{color:var(--muted);cursor:pointer;padding-left:8px}
  .miniadd{display:flex;gap:6px;margin-top:8px}
  .miniadd .pn{flex:1}.miniadd .pp{width:84px}
  .miniadd input{padding:10px 11px;font-size:14px}
  .empty{color:var(--muted);font-size:14px;padding:14px;border:1px dashed var(--line);border-radius:12px;text-align:center}
  .order{background:var(--soft);border-radius:12px;margin-bottom:8px;overflow:hidden}
  .ohead{display:flex;align-items:center;justify-content:space-between;padding:12px 13px;cursor:pointer;gap:10px}
  .ohead .nm{font-weight:800;font-size:16px;color:var(--gold)}.ohead .meta{font-size:12px;color:var(--muted);margin-top:1px}
  .chev{color:var(--muted);font-size:13px}
  .odetail{padding:0 13px 13px}
  .rcpt{background:#15151a;border-radius:11px;padding:14px}
  .rtitle{font-weight:800;text-align:center;font-size:15px}.rmeta{text-align:center;color:var(--muted);font-size:12px;margin-bottom:10px}
  .rline{display:flex;justify-content:space-between;font-size:14px;padding:3px 0;gap:10px}
  .rtot{font-weight:800;border-top:1px solid var(--line);margin-top:6px;padding-top:8px}
  .rnote{margin-top:10px;text-align:center;color:var(--muted);font-size:11px}
  details{margin-top:10px;border-top:1px solid var(--line);padding-top:8px}
  summary{color:var(--gold);font-size:14px;font-weight:700;cursor:pointer;padding:8px 0;list-style:none}
  summary::-webkit-details-marker{display:none}
  .cfgwarn{background:rgba(255,90,77,.16);color:var(--err);padding:14px;border-radius:12px;font-size:14px;line-height:1.5}
  .rsum{background:var(--soft);border-radius:14px;padding:16px}
  .rsum .big{font-size:30px;font-weight:800;color:var(--gold)}
  .rsum .big span{font-size:15px;color:var(--muted);font-weight:600;margin-left:8px}
  .rsum .split{display:flex;gap:10px;margin-top:12px}
  .rsum .cell{flex:1;background:#15151a;border-radius:11px;padding:11px 12px}
  .rsum .cell .k{font-size:12px;color:var(--muted);font-weight:700}
  .rsum .cell .v{font-size:18px;font-weight:800;margin-top:2px}
  .rsum .avg{margin-top:12px;font-size:14px;color:var(--muted);font-weight:600}
  .rsum .avg b{color:var(--ink)}
  .modal{position:fixed;inset:0;background:rgba(0,0,0,.6);display:flex;align-items:flex-end;justify-content:center;z-index:50}
  .sheet{background:var(--card);width:100%;max-width:480px;border-radius:20px 20px 0 0;padding:20px 16px calc(20px + env(safe-area-inset-bottom));max-height:86vh;overflow:auto}
  .sheet-h{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
  .sheet-h b{font-size:19px;font-weight:800}.sheet-h .x{color:var(--muted);font-size:22px;cursor:pointer}
  .og{margin-top:14px}.og .gt{font-size:13px;font-weight:700;color:var(--muted);margin-bottom:8px}.og .gt .req{color:var(--err)}
  .optrow{display:flex;align-items:center;gap:10px;padding:12px 13px;border:1px solid var(--line);border-radius:11px;margin-bottom:7px;cursor:pointer}
  .optrow .od{margin-left:auto;color:var(--gold);font-weight:700}
  .optrow .ck{width:20px;height:20px;border-radius:50%;border:2px solid var(--line);flex:none;display:grid;place-items:center;font-size:12px;font-weight:800;color:#1a1a1e}
  .optrow.sel{border-color:var(--gold);background:rgba(230,180,80,.10)}
  .optrow.sel .ck{background:var(--gold);border-color:var(--gold)}
  .optrow.sel .ck::after{content:"✓"}
</style>
</head>
<body>
<div class="wrap">

  <div class="appbar">
    <img class="logo-wordmark" src="wordmark.png" alt="easypos" />
    <div class="langbar"><button data-lang="zh">中</button><button data-lang="en">EN</button><button data-lang="it">IT</button></div>
  </div>

  <div class="card hidden" id="cfgView"><div class="cfgwarn" data-i18n="cfg_warn">还没读到 Supabase 配置。</div></div>

  <div class="card hidden" id="loginView">
    <h1 data-i18n="login_title">登录</h1><div class="sub" data-i18n="login_sub">用你在 Supabase 建的账户登录</div>
    <label data-i18n="email">邮箱</label><input id="email" type="email" autocomplete="username" placeholder="you@example.com" />
    <label data-i18n="password">密码</label><input id="password" type="password" autocomplete="current-password" placeholder="••••••••" />
    <button class="btn" id="loginBtn" data-i18n="login_btn">登录</button>
    <div class="msg err" id="loginMsg"></div>
  </div>

  <div class="card hidden" id="appView">
    <div class="seg" style="position:relative"><button id="tabSell" class="on" data-i18n="tab_sell">收银</button><button id="tabDine" data-i18n="tab_dine">点菜</button><button id="tabOrders" data-i18n="tab_orders">订单</button><button id="moreBtn"><span data-i18n="more">更多</span> ▾</button><div id="moreMenu" class="dropdown hidden"><button data-go="report" data-i18n="tab_report">汇总</button><button data-go="menu" data-i18n="tab_menu">菜单</button><button data-go="settings" data-i18n="tab_settings">设置</button></div></div>

    <div id="sellTab">
      <div class="today" id="today"></div>
      <div class="filter" id="catFilter"></div>
      <div class="grid-prod" id="prodGrid"></div>
      <div class="section-t" data-i18n="cart">购物车</div>
      <div id="cart"></div>
      <div class="total-row"><span data-i18n="total">合计</span><b id="cartTotal">€0.00</b></div>
      <button class="btn" id="checkoutBtn" disabled data-i18n="checkout">结账</button>
      <div id="checkoutPanel" class="hidden" style="margin-top:14px">
        <div class="section-t" data-i18n="pay_method" style="margin-top:4px">付款方式</div>
        <div class="seg"><button id="payCash" class="on" data-i18n="pay_cash">现金</button><button id="payCard" data-i18n="pay_card">刷卡</button></div>
        <div class="total-row"><span data-i18n="total">合计</span><b id="coTotal">€0.00</b></div>
        <div id="cashBox">
          <label data-i18n="cash_received">收到现金 €</label>
          <input id="cashInput" type="number" inputmode="decimal" step="0.01" placeholder="0.00" />
          <div class="total-row"><span data-i18n="change">找零</span><b id="changeOut">€0.00</b></div>
        </div>
        <button class="btn ok" id="finishBtn" data-i18n="finish">完成收款</button>
        <button class="btn ghost" id="cancelCheckout" style="width:100%;margin-top:10px;text-align:center" data-i18n="cancel">取消</button>
        <div class="msg" id="payMsg"></div>
      </div>
    </div>

    <div id="dineTab" class="hidden">
      <div class="section-t" data-i18n="open_tables">开着的桌</div>
      <div id="openTables"></div>
      <div class="section-t" data-i18n="new_order">新点单</div>
      <div id="addBanner" class="hidden" style="background:rgba(230,180,80,.16);color:var(--gold);font-weight:700;padding:10px 12px;border-radius:10px;margin-bottom:12px;font-size:14px"></div>
      <div class="filter" id="catFilter2"></div>
      <div class="grid-prod" id="prodGrid2"></div>
      <div class="section-t" data-i18n="cart">购物车</div>
      <div id="cart2"></div>
      <div class="total-row"><span data-i18n="total">合计</span><b id="cartTotal2">€0.00</b></div>
      <div id="dineActions">
        <button class="btn" id="openTableBtn" disabled data-i18n="open_table_btn">开桌</button>
        <button class="btn ghost" id="dineQuickBtn" disabled style="width:100%;margin-top:10px;text-align:center" data-i18n="pay_now_btn">直接收钱</button>
      </div>
      <div id="addActions" class="hidden">
        <button class="btn" id="addToTableBtn" data-i18n="add_to_table">加到桌</button>
        <button class="btn ghost" id="cancelAddBtn" style="width:100%;margin-top:10px;text-align:center" data-i18n="cancel_add">取消加菜</button>
      </div>
    </div>

    <div id="ordersTab" class="hidden">
      <div class="section-t" data-i18n="tab_orders">订单</div>
      <div id="ordersList"></div>
    </div>

    <div id="menuTab" class="hidden">
      <div class="subseg"><button id="smCat" class="on" data-i18n="cat">分类</button><button id="smProd" data-i18n="products">菜品</button><button id="smMod" data-i18n="mod_tab">加料</button></div>

      <div id="menuCat">
        <div class="row-add"><input id="catName" data-ph="cat_ph" placeholder="如:咖啡 / 早午餐 / 甜点" /><button class="btn sm" id="addCatBtn" data-i18n="add">添加</button></div>
        <div class="chips" id="catList" style="margin-top:12px"></div>
      </div>

      <div id="menuProd" class="hidden">
        <label data-i18n="name">名称</label><input id="pName" data-ph="name_ph" placeholder="如:Cappuccino" />
        <div class="row2">
          <div><label data-i18n="price">价格 €</label><input id="pPrice" type="number" inputmode="decimal" step="0.01" placeholder="0.00" /></div>
          <div><label data-i18n="unit">单位</label><select id="pUnit"><option value="piece" data-i18n="piece">计件</option><option value="weight" data-i18n="weight">称重</option></select></div>
        </div>
        <label data-i18n="cat">分类</label><select id="pCat"></select>
        <button class="btn" id="addProdBtn" data-i18n="add_prod">添加菜品</button>
        <div class="msg" id="menuMsg"></div>
        <div id="prodList" style="margin-top:14px"></div>
      </div>

      <div id="menuMod" class="hidden">
        <input id="mgName" data-ph="mg_name_ph" placeholder="组名(如 牛奶/份量)" />
        <div class="row2" style="margin-top:10px">
          <select id="mgType"><option value="single" data-i18n="single">单选</option><option value="multi" data-i18n="multi">多选</option></select>
          <label class="chkrow"><input type="checkbox" id="mgReq" /> <span data-i18n="required">必选</span></label>
        </div>
        <button class="btn sm" id="addMgBtn" style="margin-top:10px" data-i18n="add_group">加选项组</button>
        <div id="mgList" style="margin-top:12px"></div>
      </div>
    </div>

    <div id="settingsTab" class="hidden">
      <div class="subseg"><button id="ssStore" class="on" data-i18n="set_store">店铺</button><button id="ssTables" data-i18n="set_tables">桌位</button><button id="ssNotify" data-i18n="set_notify">通知</button><button id="ssAccount" data-i18n="set_account">账户</button></div>

      <div id="setStore">
        <label data-i18n="cur_store">当前店铺</label><select id="storeSel"></select>
        <div class="section-t" data-i18n="store_settings" style="margin-top:16px">店铺设置 / 添加店铺</div>
        <label data-i18n="store_name">店铺名称(显示名)</label><input id="storeName" placeholder="Fluffy Brunch" />
        <label data-i18n="company">公司名称</label><input id="storeCompany" placeholder="Fluffy Brunch S.r.l." />
        <div class="row2"><div><label data-i18n="address_opt">地址(可选)</label><input id="storeAddr" placeholder="Venezia…" /></div><div><label data-i18n="piva_opt">P.IVA(可选)</label><input id="storeVat" placeholder="IT…" /></div></div>
        <button class="btn" id="addStoreBtn" data-i18n="add_store">添加店铺</button>
        <div class="msg" id="storeMsg"></div>
      </div>

      <div id="setTables" class="hidden">
        <div class="row-add"><input id="tableName" data-ph="table_ph" placeholder="桌号,如 1 / 2 / 露台3" /><button class="btn sm" id="addTableBtn" data-i18n="add">添加</button></div>

  const $=(id)=>document.getElementById(id);
  let lang="zh"; try{lang=localStorage.getItem("lang")||"zh";}catch(e){}
  function t(k,vars){ let s=(I18N[k]&&(I18N[k][lang]||I18N[k].zh))||k; if(vars)for(const v in vars)s=s.replace("{"+v+"}",vars[v]); return s; }
  function applyI18n(){
    document.documentElement.lang=lang;
    document.querySelectorAll("[data-i18n]").forEach(el=>el.textContent=t(el.dataset.i18n));
    document.querySelectorAll("[data-ph]").forEach(el=>el.placeholder=t(el.dataset.ph));
    document.querySelectorAll(".langbar button").forEach(b=>b.classList.toggle("on",b.dataset.lang===lang));
  }
  async function switchLang(l){
    lang=l; try{localStorage.setItem("lang",l);}catch(e){}
    applyI18n(); renderCart();
    if(storeId()){ await loadCategories(); await loadGroups(); await loadPmg(); await loadProducts(); loadToday(); if(!$("ordersTab").classList.contains("hidden"))loadOrders(); }
  }
  document.querySelectorAll(".langbar button").forEach(b=>b.onclick=()=>switchLang(b.dataset.lang));

  const show=(el,txt,k)=>{el.textContent=txt;el.className="msg show "+(k||"");};
  const hide=(el)=>{el.className="msg";};
  const money=(n)=>"€"+Number(n||0).toFixed(2);
  const deltaFmt=(d)=>d>0?("+"+money(d)):d<0?("−"+money(Math.abs(d))):money(0);
  const unitLabel=(u)=>t(u==="weight"?"weight":"piece");
  function esc(s){return String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}

  applyI18n();
  if(!window.SUPA_URL||!window.SUPA_KEY||window.SUPA_URL.includes("你的")||window.SUPA_KEY.includes("你的")){ $("cfgView").classList.remove("hidden"); throw new Error("config missing"); }
  const sb=supabase.createClient(window.SUPA_URL,window.SUPA_KEY);
  let stores=[], categories=[], products=[], groups=[], pmg=[], tables=[], cart=[], filterCat="all";
  const storeId=()=>$("storeSel").value||null;
  function groupsForProduct(pid){ const ids=pmg.filter(x=>x.product_id===pid).map(x=>x.group_id); return groups.filter(g=>ids.includes(g.id)); }

  async function render(){
    const {data:{session}}=await sb.auth.getSession();
    if(session){ $("loginView").classList.add("hidden"); $("appView").classList.remove("hidden"); $("userEmail").textContent=session.user.email; await loadStores(); loadNotifyConfig(); }
    else { $("appView").classList.add("hidden"); $("loginView").classList.remove("hidden"); }
  }
  $("loginBtn").onclick=async()=>{
    hide($("loginMsg")); const b=$("loginBtn"); b.disabled=true; b.textContent=t("logging_in");
    const {error}=await sb.auth.signInWithPassword({email:$("email").value.trim(),password:$("password").value});
    b.disabled=false; b.textContent=t("login_btn");
    if(error){show($("loginMsg"),t("login_fail")+error.message,"err");return;} render();
  };
  $("logoutBtn").onclick=async()=>{await sb.auth.signOut(); render();};

  $("tabSell").onclick=()=>switchTab("sell"); $("tabDine").onclick=()=>switchTab("dine"); $("tabOrders").onclick=()=>switchTab("orders");
  $("moreBtn").onclick=(e)=>{ e.stopPropagation(); $("moreMenu").classList.toggle("hidden"); };
  $("moreMenu").querySelectorAll('[data-go]').forEach(b=>b.onclick=()=>switchTab(b.dataset.go));
  document.addEventListener('click',(e)=>{ if(!$("moreMenu").classList.contains("hidden") && !$("moreBtn").contains(e.target) && !e.target.closest('#moreMenu')) $("moreMenu").classList.add("hidden"); });
  function switchTab(tab){
    const panes={sell:"sellTab",dine:"dineTab",orders:"ordersTab",report:"reportTab",menu:"menuTab",settings:"settingsTab"};
    for(const k in panes)$(panes[k]).classList.toggle("hidden",k!==tab);
    $("tabSell").classList.toggle("on",tab==="sell"); $("tabDine").classList.toggle("on",tab==="dine"); $("tabOrders").classList.toggle("on",tab==="orders");
    $("moreBtn").classList.toggle("on",["report","menu","settings"].includes(tab));
    $("moreMenu").querySelectorAll('[data-go]').forEach(b=>b.classList.toggle("on",b.dataset.go===tab));
    $("moreMenu").classList.add("hidden");
    if(tab==="orders")loadOrders();
    if(tab==="report")loadReport();
    if(tab==="dine"){ renderFilter(); renderGrid(); renderCart(); loadOpenTables(); }
  }
  function showMenuSub(w){
    $("smCat").classList.toggle("on",w==="cat"); $("smProd").classList.toggle("on",w==="prod"); $("smMod").classList.toggle("on",w==="mod");
    $("menuCat").classList.toggle("hidden",w!=="cat"); $("menuProd").classList.toggle("hidden",w!=="prod"); $("menuMod").classList.toggle("hidden",w!=="mod");
  }
  $("smCat").onclick=()=>showMenuSub("cat"); $("smProd").onclick=()=>showMenuSub("prod"); $("smMod").onclick=()=>showMenuSub("mod");
  function showSetSub(w){
    $("ssStore").classList.toggle("on",w==="store"); $("ssTables").classList.toggle("on",w==="tables"); $("ssNotify").classList.toggle("on",w==="notify"); $("ssAccount").classList.toggle("on",w==="account");
    $("setStore").classList.toggle("hidden",w!=="store"); $("setTables").classList.toggle("hidden",w!=="tables"); $("setNotify").classList.toggle("hidden",w!=="notify"); $("setAccount").classList.toggle("hidden",w!=="account");
  }
  $("ssStore").onclick=()=>showSetSub("store"); $("ssTables").onclick=()=>showSetSub("tables"); $("ssNotify").onclick=()=>showSetSub("notify"); $("ssAccount").onclick=()=>showSetSub("account");

  async function loadStores(){
    const {data,error}=await sb.from("stores").select("*").order("created_at");
    if(error)return; stores=data||[];
    const sel=$("storeSel");
    if(!stores.length){ sel.innerHTML=`<option value="">${t("no_store_opt")}</option>`; $("prodGrid").innerHTML=""; $("prodList").innerHTML=""; $("catList").innerHTML=""; $("mgList").innerHTML=""; cart=[]; renderCart(); return; }
    sel.innerHTML=stores.map(s=>`<option value="${s.id}">${esc(s.name)}</option>`).join("");
    await reloadStore();
  }
  $("storeSel").onchange=reloadStore;
  async function reloadStore(){ cart=[]; renderCart(); await loadCategories(); await loadGroups(); await loadPmg(); await loadProducts(); await loadTables(); await loadToday(); }

  async function loadCategories(){
    const sid=storeId(); if(!sid)return;
    const {data,error}=await sb.from("categories").select("*").eq("store_id",sid).order("sort_order").order("created_at");
    categories=error?[]:(data||[]);
    $("catList").innerHTML=categories.length?categories.map(c=>`<span class="chip">${esc(c.name)} <span class="x" data-cat="${c.id}">✕</span></span>`).join(""):`<div class="empty" style="width:100%">${t("no_cat")}</div>`;
    $("pCat").innerHTML=`<option value="">${t("no_cat_opt")}</option>`+categories.map(c=>`<option value="${c.id}">${esc(c.name)}</option>`).join("");
    document.querySelectorAll('#catList .x').forEach(x=>x.onclick=()=>delCategory(x.dataset.cat));
    renderFilter();
  }
  function renderFilter(){
    const html=`<span class="fchip ${filterCat==='all'?'on':''}" data-f="all">${t("all")}</span>`+categories.map(c=>`<span class="fchip ${filterCat===c.id?'on':''}" data-f="${c.id}">${esc(c.name)}</span>`).join("");
    ["catFilter","catFilter2"].forEach(idn=>{ const f=$(idn); if(!f)return; f.innerHTML=html; f.querySelectorAll('.fchip').forEach(ch=>ch.onclick=()=>{filterCat=ch.dataset.f; renderFilter(); renderGrid();}); });
  }

  async function loadGroups(){
    const sid=storeId(); if(!sid){groups=[];return;}
    const {data,error}=await sb.from("modifier_groups").select("*, modifier_options(*)").eq("store_id",sid).order("created_at");
    groups=error?[]:(data||[]);
    groups.forEach(g=>(g.modifier_options||[]).sort((a,b)=>new Date(a.created_at)-new Date(b.created_at)));
    renderGroups();
  }
  function renderGroups(){
    const el=$("mgList"); if(!el)return;

  function addLine(line){ const ex=cart.find(l=>l.key===line.key); if(ex)ex.qty++; else cart.push(line); renderCart(); }
  function changeQty(key,dq){ const l=cart.find(x=>x.key===key); if(!l)return; l.qty+=dq; if(l.qty<=0)cart=cart.filter(x=>x!==l); renderCart(); }
  function cartTotal(){ return cart.reduce((s,l)=>s+l.price*l.qty,0); }
  function renderCart(){
    const html = cart.length ? cart.map(l=>`<div class="cart-line"><div class="cn"><div>${esc(l.name)}</div>${l.options_text?`<div class="copt">${esc(l.options_text)}</div>`:""}</div><span class="stepper"><button data-m="${l.key}">−</button><span class="q">${l.qty}</span><button data-p="${l.key}">+</button></span><span class="lt">${money(l.price*l.qty)}</span></div>`).join("") : `<div class="empty">${t("cart_empty")}</div>`;
    ["cart","cart2"].forEach(idn=>{ const c=$(idn); if(!c)return; c.innerHTML=html; c.querySelectorAll('[data-m]').forEach(b=>b.onclick=()=>changeQty(b.dataset.m,-1)); c.querySelectorAll('[data-p]').forEach(b=>b.onclick=()=>changeQty(b.dataset.p,1)); });
    const tot=money(cartTotal()); if($("cartTotal"))$("cartTotal").textContent=tot; if($("cartTotal2"))$("cartTotal2").textContent=tot;
    const empty=cart.length===0;
    if($("checkoutBtn"))$("checkoutBtn").disabled=empty;
    if($("openTableBtn"))$("openTableBtn").disabled=empty;
    if($("dineQuickBtn"))$("dineQuickBtn").disabled=empty;
    if($("addToTableBtn"))$("addToTableBtn").disabled=empty;
    if(empty&&$("checkoutPanel"))$("checkoutPanel").classList.add("hidden");
  }

  let payMethod="cash";
  function setPay(m){ payMethod=m; $("payCash").classList.toggle("on",m==="cash"); $("payCard").classList.toggle("on",m==="card"); $("cashBox").classList.toggle("hidden",m!=="cash"); }

  $("checkoutBtn").onclick=()=>{ hide($("payMsg")); setPay("cash"); $("checkoutPanel").classList.remove("hidden"); $("coTotal").textContent=money(cartTotal()); $("cashInput").value=""; $("changeOut").textContent=money(0); $("cashInput").focus(); };

  $("finishBtn").onclick=async()=>{
    hide($("payMsg")); const total=cartTotal(); let cash=null,change=null;
    if(payMethod==="cash"){ cash=parseFloat($("cashInput").value); if(isNaN(cash)||cash<total){ show($("payMsg"),t("cash_short",{t:money(total)}),"err"); return; } change=+(cash-total).toFixed(2); }
    const b=$("finishBtn"); b.disabled=true; b.textContent=t("saving"); const sid=storeId();
    const {data:order,error}=await sb.from("orders").insert({store_id:sid,total:+total.toFixed(2),payment_method:payMethod,cash_received:cash,change_given:change,status:"completed"}).select().single();
    if(error){ b.disabled=false; b.textContent=t("finish"); show($("payMsg"),t("save_fail")+error.message,"err"); return; }
    const items=cart.map(l=>({order_id:order.id,product_id:l.product_id,name:l.name,price:l.price,qty:l.qty,line_total:+(l.price*l.qty).toFixed(2),options_text:l.options_text||null}));

    show($("payMsg"), payMethod==="cash"?t("done_change",{c:money(change)}):"✓ "+t("pay_card"),"ok"); setTimeout(()=>hide($("payMsg")),4000);
  };

  function setRepToday(){ const d=new Date(); $("repDate").value=d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0"); }
  let reportRows=[], reportItems=[];
  async function loadReport(){
    const sid=storeId();
    if(!$("repDate").value)setRepToday();
    if(!sid){ $("repSummary").innerHTML=`<div class="empty">${t("need_store")}</div>`; $("repItems").innerHTML=""; reportRows=[];reportItems=[]; return; }
    const ds=$("repDate").value.split("-").map(Number);
    const start=new Date(ds[0],ds[1]-1,ds[2],0,0,0,0), end=new Date(ds[0],ds[1]-1,ds[2]+1,0,0,0,0);
    const {data,error}=await sb.from("orders").select("*, order_items(*)").eq("store_id",sid).gte("created_at",start.toISOString()).lt("created_at",end.toISOString()).order("created_at");
    if(error){ $("repSummary").innerHTML=`<div class="empty">${esc(error.message)}</div>`; $("repItems").innerHTML=""; return; }
    const orders=data||[]; reportRows=orders;
    let total=0,cashAmt=0,cashN=0,cardAmt=0,cardN=0; const itemMap={};
    orders.forEach(o=>{
      total+=Number(o.total);
      if(o.payment_method==="card"){cardAmt+=Number(o.total);cardN++;} else {cashAmt+=Number(o.total);cashN++;}
      (o.order_items||[]).forEach(i=>{ const key=i.name+(i.options_text?(" · "+i.options_text):""); if(!itemMap[key])itemMap[key]={name:key,qty:0,rev:0}; itemMap[key].qty+=Number(i.qty); itemMap[key].rev+=Number(i.line_total); });
    });
    const n=orders.length, avg=n?total/n:0;
    reportItems=Object.values(itemMap).sort((a,b)=>b.rev-a.rev);
    $("repSummary").innerHTML=`<div class="rsum"><div class="big">${money(total)} <span>${n} ${t("orders_unit")}</span></div>
      <div class="split"><div class="cell"><div class="k">${t("pay_cash")}</div><div class="v">${money(cashAmt)}</div><div class="k">${cashN} ${t("orders_unit")}</div></div>
      <div class="cell"><div class="k">${t("pay_card")}</div><div class="v">${money(cardAmt)}</div><div class="k">${cardN} ${t("orders_unit")}</div></div></div>
      <div class="avg">${t("avg_order")}: <b>${money(avg)}</b></div></div>`;
    $("repItems").innerHTML=reportItems.length?reportItems.map(it=>`<div class="item"><div class="iteminfo"><div class="nm">${esc(it.name)}</div><div class="meta">×${it.qty}</div></div><div class="pr">${money(it.rev)}</div></div>`).join(""):`<div class="empty">${t("no_data")}</div>`;
  }
  $("repToday").onclick=()=>{ setRepToday(); loadReport(); };
  $("repDate").onchange=loadReport;
  function csvCell(v){ v=String(v==null?"":v); return /[";\r\n]/.test(v)?('"'+v.replace(/"/g,'""')+'"'):v; }
  function toCSV(rows){ return "\uFEFF"+rows.map(r=>r.map(csvCell).join(";")).join("\r\n"); }
  function amtIt(n){ return Number(n||0).toFixed(2).replace(".",","); }
  async function shareCSV(name,csv){
    const blob=new Blob([csv],{type:"text/csv;charset=utf-8"});
    try{ const file=new File([blob],name,{type:"text/csv"}); if(navigator.canShare&&navigator.canShare({files:[file]})){ await navigator.share({files:[file],title:name}); return; } }catch(e){ if(e&&e.name==="AbortError")return; }
    const url=URL.createObjectURL(blob); const a=document.createElement("a"); a.href=url; a.download=name; document.body.appendChild(a); a.click(); a.remove(); setTimeout(()=>URL.revokeObjectURL(url),1500);
  }
  $("repExportOrders").onclick=()=>{

    reportRows.forEach(o=>rows.push([new Date(o.created_at).toLocaleString(), amtIt(o.total), o.payment_method==="card"?t("pay_card"):t("pay_cash"), o.payment_method==="cash"?amtIt(o.cash_received):"", o.payment_method==="cash"?amtIt(o.change_given):""]));
    shareCSV("easypos_orders_"+$("repDate").value+".csv", toCSV(rows));
  };
  $("repExportItems").onclick=()=>{
    const rows=[[t("name"),t("qty"),t("total")]];
    reportItems.forEach(it=>rows.push([it.name, it.qty, amtIt(it.rev)]));
    shareCSV("easypos_items_"+$("repDate").value+".csv", toCSV(rows));
  };

    show($("notifyMsg"),t("saved_ok"),"ok");
  };
  $("testNotifyBtn").onclick=async()=>{
    hide($("notifyMsg")); const sid=storeId();
    if(!sid){show($("notifyMsg"),t("need_store"),"err");return;}
    const {error}=await sb.from("audit_log").insert({store_id:sid,action:t("test_action"),detail:t("test_detail")});
    if(error){show($("notifyMsg"),t("fail")+error.message,"err");return;}
    show($("notifyMsg"),t("test_sent"),"ok");
  };

  let openOrders=[], curOpen=null, addingToOrder=null, payCtx=null, pmMethod2="cash";
  async function loadOpenTables(){
    const sid=storeId(); const el=$("openTables"); if(!sid){ openOrders=[]; if(el)el.innerHTML=""; return; }
    const {data,error}=await sb.from("orders").select("*, order_items(*), tables(name)").eq("store_id",sid).eq("status","open").order("created_at");
    if(error){ el.innerHTML=`<div class="empty">${esc(error.message)}</div>`; return; }
    openOrders=data||[];
    if(!openOrders.length){ el.innerHTML=`<div class="empty">${t("no_open_tables")}</div>`; return; }
    el.innerHTML=openOrders.map(o=>{
      const tot=(o.order_items||[]).reduce((s,i)=>s+Number(i.line_total),0);
      const n=(o.order_items||[]).reduce((s,i)=>s+Number(i.qty),0);
      const tname=o.tables?o.tables.name:"—";
      return `<div class="order"><div class="ohead" data-open="${o.id}"><div><div class="nm">${t("table_word")} ${esc(tname)}</div><div class="meta">${money(tot)} · ${n} ${t("items_word")}</div></div><span class="chev">▸</span></div></div>`;
    }).join("");
    el.querySelectorAll('[data-open]').forEach(h=>h.onclick=()=>openTableDetail(h.dataset.open));
  }
  function orderTotal(o){ return (o.order_items||[]).reduce((s,i)=>s+Number(i.line_total),0); }
  function openTableDetail(id){
    const o=openOrders.find(x=>x.id===id); if(!o)return; curOpen=o;
    $("tmTitle").textContent=t("table_word")+" "+(o.tables?o.tables.name:"—");
    $("tmItems").innerHTML=(o.order_items||[]).map(i=>`<div class="rline"><span>${esc(i.name)}${i.options_text?` (${esc(i.options_text)})`:""} ×${i.qty}</span><span>${money(i.line_total)}</span></div>`).join("")||`<div class="empty">—</div>`;
    $("tmTotal").textContent=money(orderTotal(o));
    $("tblModal").classList.remove("hidden");
  }
  $("tmClose").onclick=()=>$("tblModal").classList.add("hidden");
  $("tmSettle").onclick=()=>{ $("tblModal").classList.add("hidden"); openPay({kind:"settle",orderId:curOpen.id,total:orderTotal(curOpen)}); };
  $("tmAdd").onclick=()=>{ $("tblModal").classList.add("hidden"); enterAddMode(curOpen); };

  function enterAddMode(o){
    addingToOrder=o; cart=[]; renderCart();
    $("addBanner").classList.remove("hidden"); $("addBanner").textContent=t("adding_to")+" "+t("table_word")+" "+(o.tables?o.tables.name:"—");
    $("dineActions").classList.add("hidden"); $("addActions").classList.remove("hidden");
    $("addToTableBtn").textContent=t("add_to_table")+" "+(o.tables?o.tables.name:"—");
  }
  function exitAddMode(){ addingToOrder=null; $("addBanner").classList.add("hidden"); $("dineActions").classList.remove("hidden"); $("addActions").classList.add("hidden"); }
  $("cancelAddBtn").onclick=()=>{ cart=[]; renderCart(); exitAddMode(); };
  $("addToTableBtn").onclick=async()=>{
    if(!addingToOrder||!cart.length)return;
    const b=$("addToTableBtn"); b.disabled=true;
    const items=cart.map(l=>({order_id:addingToOrder.id,product_id:l.product_id,name:l.name,price:l.price,qty:l.qty,line_total:+(l.price*l.qty).toFixed(2),options_text:l.options_text||null}));
    const {error}=await sb.from("order_items").insert(items);
    if(error){ b.disabled=false; alert(t("fail")+error.message); return; }
    const newTotal=Number(addingToOrder.total||0)+cart.reduce((s,l)=>s+l.price*l.qty,0);
    await sb.from("orders").update({total:+newTotal.toFixed(2)}).eq("id",addingToOrder.id);
    b.disabled=false; cart=[]; renderCart(); exitAddMode(); loadOpenTables();
  };

  $("openTableBtn").onclick=()=>{
    if(!cart.length)return;
    if(!tables.length){ alert(t("no_tables_set")); return; }
    $("tblPickList").innerHTML=tables.map(tb=>`<span class="fchip" data-pick="${tb.id}">${esc(tb.name)}</span>`).join("");
    $("tblPickList").querySelectorAll('[data-pick]').forEach(c=>c.onclick=()=>openTableWith(c.dataset.pick));
    $("tblPickModal").classList.remove("hidden");
  };
  $("tpClose").onclick=()=>$("tblPickModal").classList.add("hidden");
  async function openTableWith(tableId){
    const total=cartTotal();
    const {data:order,error}=await sb.from("orders").insert({store_id:storeId(),order_type:"dine",status:"open",table_id:tableId,total:+total.toFixed(2)}).select().single();
    if(error){ alert(t("fail")+error.message); return; }
    const items=cart.map(l=>({order_id:order.id,product_id:l.product_id,name:l.name,price:l.price,qty:l.qty,line_total:+(l.price*l.qty).toFixed(2),options_text:l.options_text||null}));
    const {error:e2}=await sb.from("order_items").insert(items);
    if(e2){ alert(t("fail")+e2.message); return; }
    cart=[]; renderCart(); $("tblPickModal").classList.add("hidden"); loadOpenTables();
  }
  $("dineQuickBtn").onclick=()=>{ if(!cart.length)return; openPay({kind:"newQuick",total:cartTotal()}); };

  function setPm(m){ pmMethod2=m; $("pmCash").classList.toggle("on",m==="cash"); $("pmCard").classList.toggle("on",m==="card"); $("pmCashBox").classList.toggle("hidden",m!=="cash"); }
  $("pmCash").onclick=()=>setPm("cash"); $("pmCard").onclick=()=>setPm("card");
  $("pmClose").onclick=()=>$("payModal").classList.add("hidden");
  $("payModal").onclick=(e)=>{ if(e.target===$("payModal"))$("payModal").classList.add("hidden"); };
  $("tblModal").onclick=(e)=>{ if(e.target===$("tblModal"))$("tblModal").classList.add("hidden"); };
  $("tblPickModal").onclick=(e)=>{ if(e.target===$("tblPickModal"))$("tblPickModal").classList.add("hidden"); };
  $("pmCashInput").oninput=()=>{ const ch=parseFloat($("pmCashInput").value)-payCtx.total; $("pmChange").textContent=money(isNaN(ch)?0:Math.max(0,ch)); };
  function openPay(ctx){ payCtx=ctx; setPm("cash"); $("pmTotal").textContent=money(ctx.total); $("pmCashInput").value=""; $("pmChange").textContent=money(0); hide($("pmMsg")); $("payModal").classList.remove("hidden"); }
  $("pmConfirm").onclick=async()=>{
    hide($("pmMsg")); const total=payCtx.total; let cash=null,change=null;
    if(pmMethod2==="cash"){ cash=parseFloat($("pmCashInput").value); if(isNaN(cash)||cash<total){ show($("pmMsg"),t("cash_short",{t:money(total)}),"err"); return; } change=+(cash-total).toFixed(2); }
    const b=$("pmConfirm"); b.disabled=true; b.textContent=t("saving"); let err;
    if(payCtx.kind==="settle"){
      const r=await sb.from("orders").update({payment_method:pmMethod2,cash_received:cash,change_given:change,status:"completed",total:+total.toFixed(2)}).eq("id",payCtx.orderId); err=r.error;
    } else {
      const {data:order,error}=await sb.from("orders").insert({store_id:storeId(),order_type:"quick",status:"completed",total:+total.toFixed(2),payment_method:pmMethod2,cash_received:cash,change_given:change}).select().single();
      if(error){ err=error; } else { const items=cart.map(l=>({order_id:order.id,product_id:l.product_id,name:l.name,price:l.price,qty:l.qty,line_total:+(l.price*l.qty).toFixed(2),options_text:l.options_text||null})); const r2=await sb.from("order_items").insert(items); err=r2.error; }
    }
    b.disabled=false; b.textContent=t("finish");
    if(err){ show($("pmMsg"),t("fail")+err.message,"err"); return; }
    $("payModal").classList.add("hidden");
    if(payCtx.kind!=="settle"){ cart=[]; renderCart(); }
    loadOpenTables(); loadToday();
  };

  render();
</script>
</body>
</html>

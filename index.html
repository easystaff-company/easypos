<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#000000" />
<title>€asyPOS</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg" />

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;600;700&display=swap" rel="stylesheet">

<style>
  :root{
    --bg:#000000; --bg2:#1c1c1e; --bg3:#2c2c2e;
    --ink:#ffffff; --muted:#8d8d93; --line:#38383a;
    --accent:#0a84ff; --ok:#30d158; --err:#ff453a;
    --r:14px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{background:var(--bg);color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text",system-ui,sans-serif;
    -webkit-font-smoothing:antialiased;
    display:flex;align-items:flex-start;justify-content:center;
    padding:max(28px,env(safe-area-inset-top)) 18px 28px;min-height:100dvh;}
  .wrap{width:100%;max-width:460px;margin-top:5vh}

  .brand{margin-bottom:26px;text-align:center}
  .logo-note{width:210px;max-width:66%;height:auto;color:#fff;display:inline-block}
  .wmtext{font-family:'Quicksand',sans-serif}

  .card{background:var(--bg2);border-radius:var(--r);padding:22px 18px;margin-bottom:16px}
  h1{font-weight:700;font-size:22px;margin-bottom:4px;letter-spacing:-.01em}
  .sub{color:var(--muted);font-size:14px;margin-bottom:18px}
  label{display:block;font-size:13px;font-weight:600;color:var(--muted);margin:14px 0 6px}
  input{width:100%;padding:13px 14px;border:none;border-radius:10px;font:inherit;font-size:16px;
    background:var(--bg3);color:var(--ink);outline:none;transition:box-shadow .15s}
  input::placeholder{color:#6b6b70}
  input:focus{box-shadow:0 0 0 3px rgba(10,132,255,.35)}
  button{font:inherit;cursor:pointer;border:none}
  .btn{width:100%;margin-top:20px;padding:14px;border-radius:11px;background:var(--accent);
    color:#fff;font-weight:600;font-size:17px;transition:opacity .12s,transform .05s}
  .btn:active{transform:translateY(1px);opacity:.85}
  .btn:disabled{opacity:.5;cursor:default}
  .btn.ghost{background:var(--bg3);color:var(--accent);font-weight:600;width:auto;margin-top:0;padding:9px 15px;font-size:15px;border-radius:9px}
  .msg{margin-top:14px;font-size:14px;padding:11px 13px;border-radius:10px;display:none}
  .msg.show{display:block}
  .msg.err{background:rgba(255,69,58,.16);color:var(--err)}
  .msg.ok{background:rgba(48,209,88,.16);color:var(--ok)}
  .hidden{display:none!important}
  .top{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;gap:12px}
  .who{font-size:13px;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .who b{color:var(--ink);font-weight:600}
  .badge{display:inline-flex;align-items:center;gap:8px;font-size:14px;font-weight:600;color:var(--ok);
    background:rgba(48,209,88,.14);border-radius:999px;padding:8px 13px}
  .dot{width:7px;height:7px;border-radius:50%;background:var(--ok)}
  .section-t{font-size:13px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;margin:6px 0 10px;padding:0 2px}
  .store{display:flex;align-items:center;gap:12px;padding:13px;border-radius:11px;margin-bottom:9px;background:var(--bg3)}
  .store .si{width:36px;height:36px;border-radius:9px;background:var(--accent);display:grid;place-items:center;font-weight:700;color:#fff;flex:none}
  .store .sn{font-weight:600;font-size:16px}
  .store .sm{font-size:13px;color:var(--muted);margin-top:1px}
  .empty{color:var(--muted);font-size:14px;padding:16px;border:1px dashed var(--line);border-radius:11px;text-align:center}
  .row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .cfgwarn{background:rgba(255,69,58,.16);color:var(--err);padding:14px;border-radius:11px;font-size:14px;line-height:1.5}
</style>
</head>
<body>
<div class="wrap">

  <div class="brand">
    <svg class="logo-note" viewBox="0 0 200 100" role="img" aria-label="easypos">
      <rect x="6" y="14" width="188" height="72" rx="11" fill="none" stroke="currentColor" stroke-width="2.6"/>
      <rect x="13" y="22" width="174" height="56" rx="6" fill="none" stroke="currentColor" stroke-width="1"/>
      <text class="wmtext" x="100" y="57" text-anchor="middle" font-size="22" font-weight="600" fill="currentColor">€asyPOS</text>
      <text class="wmtext" x="176" y="73" text-anchor="end" font-size="8.5" font-weight="500" fill="currentColor" letter-spacing="1">2026</text>
    </svg>
  </div>

  <div class="card hidden" id="cfgView">
    <div class="cfgwarn">还没读到 Supabase 配置。请确认 <b>config.js</b> 和 index.html 在同一个文件夹,并且里面填了你的 Project URL 和 anon 钥匙。</div>
  </div>

  <div class="card hidden" id="loginView">
    <h1>登录</h1>
    <div class="sub">用你在 Supabase 建的账户登录</div>
    <label>邮箱</label>
    <input id="email" type="email" autocomplete="username" placeholder="you@example.com" />
    <label>密码</label>
    <input id="password" type="password" autocomplete="current-password" placeholder="••••••••" />
    <button class="btn" id="loginBtn">登录</button>
    <div class="msg err" id="loginMsg"></div>
  </div>

  <div class="card hidden" id="appView">
    <div class="top">
      <div class="who">登录账户:<b id="userEmail">—</b></div>
      <button class="btn ghost" id="logoutBtn">退出</button>
    </div>
    <div class="badge"><span class="dot"></span> <span id="acctStatus">正在验证账户…</span></div>

    <div class="section-t" style="margin-top:18px">我的店铺</div>
    <div id="storeList"></div>

    <div class="section-t" style="margin-top:18px">添加一个店铺</div>
    <label>店铺名称(对外显示名)</label>
    <input id="storeName" placeholder="例如:Fluffy Brunch" />
    <label>公司名称(开票法定名 / Ragione sociale)</label>
    <input id="storeCompany" placeholder="例如:Fluffy Brunch S.r.l." />
    <div class="row2">
      <div><label>地址(可选)</label><input id="storeAddr" placeholder="Venezia…" /></div>
      <div><label>P.IVA(可选)</label><input id="storeVat" placeholder="IT…" /></div>
    </div>
    <button class="btn" id="addStoreBtn">添加店铺</button>
    <div class="msg" id="storeMsg"></div>
  </div>

</div>

<script>
  const $ = (id) => document.getElementById(id);
  const show = (el, t, k) => { el.textContent = t; el.className = "msg show " + (k||""); };
  const hide = (el) => { el.className = "msg"; };

  if (!window.SUPA_URL || !window.SUPA_KEY ||
      window.SUPA_URL.includes("你的") || window.SUPA_KEY.includes("你的")) {
    $("cfgView").classList.remove("hidden");
    throw new Error("config missing");
  }

  const sb = supabase.createClient(window.SUPA_URL, window.SUPA_KEY);

  async function render() {
    const { data:{ session } } = await sb.auth.getSession();
    if (session) {
      $("loginView").classList.add("hidden");
      $("appView").classList.remove("hidden");
      $("userEmail").textContent = session.user.email;
      await verifyAccount();
      await loadStores();
    } else {
      $("appView").classList.add("hidden");
      $("loginView").classList.remove("hidden");
    }
  }

  $("loginBtn").onclick = async () => {
    hide($("loginMsg"));
    const btn = $("loginBtn"); btn.disabled = true; btn.textContent = "登录中…";
    const { error } = await sb.auth.signInWithPassword({
      email: $("email").value.trim(), password: $("password").value
    });
    btn.disabled = false; btn.textContent = "登录";
    if (error) { show($("loginMsg"), "登录失败:" + error.message, "err"); return; }
    render();
  };

  $("logoutBtn").onclick = async () => { await sb.auth.signOut(); render(); };

  async function verifyAccount() {
    const { data, error } = await sb.from("bosses").select("id,email").limit(1);
    if (error) { $("acctStatus").textContent = "账户读取出错:" + error.message; return; }
    $("acctStatus").textContent = (data && data.length) ? "账户已验证 · 权限正常" : "已登录,但没读到账户记录";
  }

  async function loadStores() {
    const { data, error } = await sb.from("stores").select("*").order("created_at",{ascending:true});
    const list = $("storeList");
    if (error) { list.innerHTML = '<div class="empty">读取出错:'+esc(error.message)+'</div>'; return; }
    if (!data || !data.length) { list.innerHTML = '<div class="empty">还没有店铺,在下面添加一个 →</div>'; return; }
    list.innerHTML = data.map(s => {
      const sub = [s.company_name, s.address, s.vat_number].filter(Boolean).map(esc).join(" · ");
      return `<div class="store">
        <div class="si">${(s.name||"?").trim().charAt(0).toUpperCase()}</div>
        <div><div class="sn">${esc(s.name)}</div>${sub?`<div class="sm">${sub}</div>`:""}</div>
      </div>`;
    }).join("");
  }

  $("addStoreBtn").onclick = async () => {
    hide($("storeMsg"));
    const name = $("storeName").value.trim();
    if (!name) { show($("storeMsg"), "请填店铺名称", "err"); return; }
    const btn = $("addStoreBtn"); btn.disabled = true; btn.textContent = "添加中…";
    const { data:{ user } } = await sb.auth.getUser();
    const { error } = await sb.from("stores").insert({
      boss_id: user.id, name,
      company_name: $("storeCompany").value.trim() || null,
      address: $("storeAddr").value.trim() || null,
      vat_number: $("storeVat").value.trim() || null
    });
    btn.disabled = false; btn.textContent = "添加店铺";
    if (error) { show($("storeMsg"), "添加失败:" + error.message, "err"); return; }
    show($("storeMsg"), "已添加 ✓", "ok");
    $("storeName").value = $("storeCompany").value = $("storeAddr").value = $("storeVat").value = "";
    loadStores();
  };

  function esc(s){ return String(s).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }

  render();
</script>
</body>
</html>

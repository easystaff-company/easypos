<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#0d0d10" />
<title>easypos · admin</title>
<link rel="icon" type="image/png" href="icon.png" />
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{--bg:#0d0d10;--card:#1a1a1f;--soft:#23232a;--ink:#f3f0e9;--muted:#8d8d96;--line:#2e2e36;--gold:#e6b450;--gold2:#d89b2e;--ok:#34d164;--err:#ff5a4d;}
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:radial-gradient(135% 90% at 50% -10%,#1c1c22 0%,#0c0c0f 55%) fixed;color:var(--ink);font-family:'Outfit',system-ui,sans-serif;-webkit-font-smoothing:antialiased;display:flex;justify-content:center;padding:max(18px,env(safe-area-inset-top)) 16px 44px;min-height:100dvh}
  .wrap{width:100%;max-width:560px}
  .appbar{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:16px;flex-wrap:wrap}
  .brand{font-family:'Bricolage Grotesque',sans-serif;font-weight:700;font-size:22px}
  .brand .g{color:var(--gold)}
  .aright{display:flex;gap:8px;align-items:center}
  .langbar{display:flex;gap:6px}
  .langbar button{background:var(--soft);color:var(--muted);border-radius:9px;padding:7px 10px;font-size:13px;font-weight:700;border:none;cursor:pointer}
  .langbar button.on{background:linear-gradient(180deg,var(--gold),var(--gold2));color:#1a1a1e}
  .card{background:var(--card);border:1px solid #23232b;border-radius:16px;padding:18px 16px;margin-bottom:16px;box-shadow:0 10px 30px rgba(0,0,0,.35)}
  h1{font-family:'Bricolage Grotesque',sans-serif;font-weight:700;font-size:22px;margin-bottom:4px}
  .sub{color:var(--muted);font-size:14px;margin-bottom:16px}
  label{display:block;font-size:12px;font-weight:600;color:var(--muted);margin:12px 0 6px}
  input,select,textarea{width:100%;padding:12px 13px;border:none;border-radius:10px;font:inherit;font-size:16px;background:var(--soft);color:var(--ink);outline:none;-webkit-appearance:none;appearance:none}
  input:focus,select:focus,textarea:focus{box-shadow:0 0 0 3px rgba(230,180,80,.32)}
  select{background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='12' height='8' viewBox='0 0 12 8'><path d='M1 1l5 5 5-5' stroke='%238d8d96' stroke-width='2' fill='none' stroke-linecap='round'/></svg>");background-repeat:no-repeat;background-position:right 12px center;padding-right:32px}
  button{font:inherit;cursor:pointer;border:none}
  .btn{width:100%;margin-top:14px;padding:14px;border-radius:12px;background:linear-gradient(180deg,var(--gold),var(--gold2));color:#1a1a1e;font-weight:800;font-size:16px}
  .btn:active{opacity:.9}.btn:disabled{opacity:.4}
  .btn.ghost{background:var(--soft);color:var(--gold);width:auto;margin:0;padding:9px 13px;font-size:14px;font-weight:700;border-radius:10px}
  .btn.sm{width:auto;margin:0;padding:10px 13px;font-size:14px;border-radius:10px;flex:1}
  .msg{margin-top:12px;font-size:14px;padding:10px 12px;border-radius:10px;display:none}
  .msg.show{display:block}.msg.err{background:rgba(255,90,77,.16);color:var(--err)}.msg.ok{background:rgba(52,209,100,.16);color:var(--ok)}
  .hidden{display:none!important}
  .section-t{font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin:8px 2px 10px}
  .top{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:6px}
  .ucard{background:var(--soft);border-radius:12px;padding:14px;margin-bottom:10px}
  .uemail{font-weight:700;font-size:15px;word-break:break-all}
  .badge{display:inline-block;font-size:11px;font-weight:800;padding:3px 8px;border-radius:999px;margin-top:4px}
  .badge.trial{background:rgba(230,180,80,.2);color:var(--gold)}
  .badge.active{background:rgba(52,209,100,.18);color:var(--ok)}
  .badge.expired,.badge.suspended{background:rgba(255,90,77,.18);color:var(--err)}
  .row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .qrow{display:flex;gap:8px;margin-top:10px}
  .stat{font-size:13px;color:var(--muted);margin:10px 2px}
  .chk{display:flex;align-items:center;gap:8px;margin-top:12px;font-size:15px;color:var(--ink)}
  .chk input{width:22px;height:22px;-webkit-appearance:auto;appearance:auto;accent-color:var(--gold);flex:none}
  textarea{min-height:46px;resize:vertical}
</style>
</head>
<body>
<div class="wrap">
  <div class="appbar">
    <div class="brand">easy<span class="g">pos</span> · <span data-i18n="brand_suffix">后台</span></div>
    <div class="aright">
      <div class="langbar"><button data-lang="zh">中</button><button data-lang="en">EN</button><button data-lang="it">IT</button></div>
      <button class="btn ghost hidden" id="logoutBtn" data-i18n="logout">退出</button>
    </div>
  </div>

  <div class="card hidden" id="cfgView"><div class="msg err show" data-i18n="cfg_warn">没读到 config.js。</div></div>

  <div class="card hidden" id="loginView">
    <h1 data-i18n="login_title">后台登录</h1><div class="sub" data-i18n="login_sub">用管理员账号登录</div>
    <label data-i18n="email">邮箱</label><input id="email" type="email" autocomplete="username" />
    <label data-i18n="password">密码</label><input id="password" type="password" autocomplete="current-password" />
    <button class="btn" id="loginBtn" data-i18n="login">登录</button>
    <div class="msg err" id="loginMsg"></div>
  </div>

  <div class="card hidden" id="denyView">
    <h1 data-i18n="deny_title">无权限</h1><div class="sub" data-i18n="deny_sub">这个账号不是管理员。</div>
  </div>

  <div id="adminView" class="hidden">
    <div class="card">
      <div class="section-t" data-i18n="platform_t">平台通知 (Telegram · 新用户注册)</div>
      <label data-i18n="token">Bot Token</label><input id="pToken" placeholder="123456:ABC..." />
      <label data-i18n="chat_signup">接收注册通知的 Chat ID</label><input id="pChat" placeholder="123456789" />
      <label class="chk"><input type="checkbox" id="pEnabled" /> <span data-i18n="enable_signup">开启注册通知</span></label>
      <button class="btn" id="savePlatformBtn" data-i18n="save_platform">保存平台设置</button>
      <button class="btn ghost" id="testPlatformBtn" style="width:100%;margin-top:10px;text-align:center" data-i18n="send_test">发送测试</button>
      <div class="msg" id="platformMsg"></div>
    </div>

    <div class="card">
      <div class="top"><div class="section-t" style="margin:0" data-i18n="users_t">用户</div><div class="stat" id="userCount"></div></div>
      <input id="search" data-ph="search_ph" placeholder="搜索邮箱…" />
      <div id="userList" style="margin-top:12px"></div>
    </div>
  </div>
</div>

<script>
  const I18N={
    brand_suffix:{zh:"后台",en:"Admin",it:"Admin"},
    logout:{zh:"退出",en:"Log out",it:"Esci"},
    cfg_warn:{zh:"没读到 config.js,请确认它和 admin.html 在同一文件夹。",en:"config.js not found — keep it next to admin.html.",it:"config.js non trovato — tienilo accanto ad admin.html."},
    login_title:{zh:"后台登录",en:"Admin login",it:"Accesso admin"},
    login_sub:{zh:"用管理员账号登录",en:"Sign in with an admin account",it:"Accedi con un account admin"},
    email:{zh:"邮箱",en:"Email",it:"Email"},password:{zh:"密码",en:"Password",it:"Password"},
    login:{zh:"登录",en:"Log in",it:"Accedi"},logging_in:{zh:"登录中…",en:"Signing in…",it:"Accesso…"},
    login_fail:{zh:"登录失败:",en:"Login failed: ",it:"Accesso non riuscito: "},
    deny_title:{zh:"无权限",en:"No access",it:"Nessun accesso"},
    deny_sub:{zh:"这个账号不是管理员。如需开通,请在数据库 admins 表里加上它。",en:"This account is not an admin. Add it to the admins table to grant access.",it:"Questo account non è admin. Aggiungilo alla tabella admins per l'accesso."},
    platform_t:{zh:"平台通知 (Telegram · 新用户注册)",en:"Platform notifications (Telegram · new signups)",it:"Notifiche piattaforma (Telegram · nuovi utenti)"},
    token:{zh:"Bot Token",en:"Bot Token",it:"Bot Token"},
    chat_signup:{zh:"接收注册通知的 Chat ID",en:"Chat ID for signup alerts",it:"Chat ID per le notifiche di registrazione"},
    enable_signup:{zh:"开启注册通知",en:"Enable signup alerts",it:"Attiva notifiche di registrazione"},
    save_platform:{zh:"保存平台设置",en:"Save platform settings",it:"Salva impostazioni"},
    send_test:{zh:"发送测试",en:"Send test",it:"Invia prova"},
    sending:{zh:"发送中…",en:"Sending…",it:"Invio…"},saving:{zh:"保存中…",en:"Saving…",it:"Salvataggio…"},
    saved:{zh:"已保存 ✓",en:"Saved ✓",it:"Salvato ✓"},fail:{zh:"失败:",en:"Failed: ",it:"Errore: "},
    sent_check:{zh:"已发送,去 Telegram 看看 ✓",en:"Sent — check Telegram ✓",it:"Inviato — controlla Telegram ✓"},
    need_token:{zh:"请先填 Token 和 Chat ID",en:"Enter Token and Chat ID first",it:"Inserisci prima Token e Chat ID"},
    not_admin:{zh:"无管理员权限",en:"Not an admin",it:"Non sei admin"},result:{zh:"结果:",en:"Result: ",it:"Risultato: "},
    users_t:{zh:"用户",en:"Users",it:"Utenti"},users_unit:{zh:"个用户",en:"users",it:"utenti"},
    search_ph:{zh:"搜索邮箱…",en:"Search email…",it:"Cerca email…"},no_match:{zh:"没有匹配的用户",en:"No matching users",it:"Nessun utente"},
    f_status:{zh:"状态",en:"Status",it:"Stato"},f_plan:{zh:"套餐",en:"Plan",it:"Piano"},
    f_trial:{zh:"试用到期",en:"Trial ends",it:"Fine prova"},f_paid:{zh:"付费到期",en:"Paid until",it:"Pagato fino"},f_notes:{zh:"备注",en:"Notes",it:"Note"},
    st_trial:{zh:"试用",en:"Trial",it:"Prova"},st_active:{zh:"已付费",en:"Paid",it:"Attivo"},st_expired:{zh:"过期",en:"Expired",it:"Scaduto"},st_suspended:{zh:"停用",en:"Suspended",it:"Sospeso"},
    q_trial30:{zh:"试用+30天",en:"Trial +30d",it:"Prova +30g"},q_paid1y:{zh:"标记已付费1年",en:"Mark paid 1y",it:"Pagato 1 anno"},
    save:{zh:"保存",en:"Save",it:"Salva"},updated:{zh:"已更新 ✓",en:"Updated ✓",it:"Aggiornato ✓"},no_email:{zh:"(无邮箱)",en:"(no email)",it:"(nessuna email)"}
  };
  const STKEYS=["trial","active","expired","suspended"];

  const $=(id)=>document.getElementById(id);
  let lang="zh"; try{lang=localStorage.getItem("lang")||"zh";}catch(e){}
  function t(k){ return (I18N[k]&&(I18N[k][lang]||I18N[k].zh))||k; }
  const stLabel=(k)=>t("st_"+k);
  function applyI18n(){
    document.documentElement.lang=lang;
    document.querySelectorAll("[data-i18n]").forEach(el=>el.textContent=t(el.dataset.i18n));
    document.querySelectorAll("[data-ph]").forEach(el=>el.placeholder=t(el.dataset.ph));
    document.querySelectorAll(".langbar button").forEach(b=>b.classList.toggle("on",b.dataset.lang===lang));
  }
  function switchLang(l){ lang=l; try{localStorage.setItem("lang",l);}catch(e){} applyI18n(); if(!$("adminView").classList.contains("hidden"))renderUsers(); }
  document.querySelectorAll(".langbar button").forEach(b=>b.onclick=()=>switchLang(b.dataset.lang));

  const show=(el,tx,k)=>{el.textContent=tx;el.className="msg show "+(k||"");};
  const hide=(el)=>{el.className="msg";};
  const esc=(s)=>String(s==null?"":s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));

  applyI18n();
  if(!window.SUPA_URL||!window.SUPA_KEY){ $("cfgView").classList.remove("hidden"); throw new Error("no config"); }
  const sb=supabase.createClient(window.SUPA_URL,window.SUPA_KEY);
  let users=[];

  async function render(){
    const {data:{session}}=await sb.auth.getSession();
    if(!session){ $("adminView").classList.add("hidden"); $("denyView").classList.add("hidden"); $("logoutBtn").classList.add("hidden"); $("loginView").classList.remove("hidden"); return; }
    $("loginView").classList.add("hidden"); $("logoutBtn").classList.remove("hidden");
    const {data:adm}=await sb.from("admins").select("user_id").eq("user_id",session.user.id).maybeSingle();
    if(!adm){ $("denyView").classList.remove("hidden"); $("adminView").classList.add("hidden"); return; }
    $("denyView").classList.add("hidden"); $("adminView").classList.remove("hidden");
    await loadPlatform(); await loadUsers();
  }
  $("loginBtn").onclick=async()=>{
    hide($("loginMsg")); const b=$("loginBtn"); b.disabled=true; b.textContent=t("logging_in");
    const {error}=await sb.auth.signInWithPassword({email:$("email").value.trim(),password:$("password").value});
    b.disabled=false; b.textContent=t("login");
    if(error){show($("loginMsg"),t("login_fail")+error.message,"err");return;} render();
  };
  $("logoutBtn").onclick=async()=>{ await sb.auth.signOut(); render(); };

  async function loadPlatform(){
    const {data}=await sb.from("platform_config").select("*").eq("id",1).maybeSingle();
    if(data){ $("pToken").value=data.dev_token||""; $("pChat").value=data.dev_chat_id||""; $("pEnabled").checked=data.notify_signups!==false; }
    else { $("pEnabled").checked=true; }
  }
  $("savePlatformBtn").onclick=async()=>{
    hide($("platformMsg")); const b=$("savePlatformBtn"); b.disabled=true; b.textContent=t("saving");
    const {error}=await sb.from("platform_config").upsert({id:1,dev_token:$("pToken").value.trim()||null,dev_chat_id:$("pChat").value.trim()||null,notify_signups:$("pEnabled").checked});
    b.disabled=false; b.textContent=t("save_platform");
    if(error){show($("platformMsg"),t("fail")+error.message,"err");return;}
    show($("platformMsg"),t("saved"),"ok");
  };
  $("testPlatformBtn").onclick=async()=>{
    hide($("platformMsg")); const b=$("testPlatformBtn"); b.disabled=true; b.textContent=t("sending");
    await sb.from("platform_config").upsert({id:1,dev_token:$("pToken").value.trim()||null,dev_chat_id:$("pChat").value.trim()||null,notify_signups:$("pEnabled").checked});
    const {data,error}=await sb.rpc("test_platform_notify");
    b.disabled=false; b.textContent=t("send_test");
    if(error){show($("platformMsg"),t("fail")+error.message,"err");return;}
    if(data==="ok")show($("platformMsg"),t("sent_check"),"ok");
    else if(data==="no_config")show($("platformMsg"),t("need_token"),"err");
    else if(data==="not_admin")show($("platformMsg"),t("not_admin"),"err");
    else show($("platformMsg"),t("result")+data,"err");
  };

  async function loadUsers(){
    const [{data:subs},{data:bosses}]=await Promise.all([
      sb.from("subscriptions").select("*"),
      sb.from("bosses").select("id,email")
    ]);
    const emap={}; (bosses||[]).forEach(b=>emap[b.id]=b.email);
    users=(subs||[]).map(s=>({...s,email:emap[s.boss_id]||null})).sort((a,b)=>String(a.email||"").localeCompare(String(b.email||"")));
    renderUsers();
  }
  function renderUsers(){
    const q=$("search").value.trim().toLowerCase();
    const list=users.filter(u=>!q||String(u.email||"").toLowerCase().includes(q));
    $("userCount").textContent=users.length+" "+t("users_unit");
    if(!list.length){ $("userList").innerHTML=`<div class="stat">${t("no_match")}</div>`; return; }
    $("userList").innerHTML=list.map(u=>{
      const st=u.status||"trial";
      return `<div class="ucard" data-id="${u.boss_id}">
        <div class="uemail">${esc(u.email||t("no_email"))}</div>
        <span class="badge ${st}">${stLabel(st)}</span>
        <div class="row2" style="margin-top:10px">
          <div><label>${t("f_status")}</label><select data-f="status">${STKEYS.map(k=>`<option value="${k}" ${k===st?"selected":""}>${stLabel(k)}</option>`).join("")}</select></div>
          <div><label>${t("f_plan")}</label><input data-f="plan" value="${esc(u.plan||"")}" placeholder="basic" /></div>
        </div>
        <div class="row2">
          <div><label>${t("f_trial")}</label><input type="date" data-f="trial_ends_at" value="${u.trial_ends_at||""}" /></div>
          <div><label>${t("f_paid")}</label><input type="date" data-f="paid_until" value="${u.paid_until||""}" /></div>
        </div>
        <label>${t("f_notes")}</label><textarea data-f="notes" placeholder="">${esc(u.notes||"")}</textarea>
        <div class="qrow">
          <button class="btn sm ghost" data-q="trial30">${t("q_trial30")}</button>
          <button class="btn sm ghost" data-q="paid1y">${t("q_paid1y")}</button>
        </div>
        <button class="btn" data-save="${u.boss_id}">${t("save")}</button>
        <div class="msg" data-msg="${u.boss_id}"></div>
      </div>`;
    }).join("");
    $("userList").querySelectorAll('[data-save]').forEach(b=>b.onclick=()=>saveUser(b.dataset.save));
    $("userList").querySelectorAll('[data-q]').forEach(b=>b.onclick=()=>{ const card=b.closest('.ucard'); quickAction(card.dataset.id,b.dataset.q,card); });
  }
  function readCard(id){
    const card=$("userList").querySelector(`.ucard[data-id="${id}"]`);
    const g=(f)=>card.querySelector(`[data-f="${f}"]`).value;
    return {status:g("status"),plan:g("plan").trim()||null,trial_ends_at:g("trial_ends_at")||null,paid_until:g("paid_until")||null,notes:g("notes").trim()||null};
  }
  async function saveUser(id){
    const card=$("userList").querySelector(`.ucard[data-id="${id}"]`); const msg=card.querySelector('[data-msg]'); hide(msg);
    const vals=readCard(id); vals.updated_at=new Date().toISOString();
    const {error}=await sb.from("subscriptions").update(vals).eq("boss_id",id);
    if(error){show(msg,t("fail")+error.message,"err");return;}
    const u=users.find(x=>x.boss_id===id); Object.assign(u,vals);
    show(msg,t("saved"),"ok"); setTimeout(()=>{hide(msg);renderUsers();},900);
  }
  function addDays(n){ const d=new Date(); d.setDate(d.getDate()+n); return d.toISOString().slice(0,10); }
  async function quickAction(id,kind,card){
    const msg=card.querySelector('[data-msg]'); hide(msg);
    const vals = kind==="trial30" ? {status:"trial",trial_ends_at:addDays(30)} : {status:"active",paid_until:addDays(365)};
    vals.updated_at=new Date().toISOString();
    const {error}=await sb.from("subscriptions").update(vals).eq("boss_id",id);
    if(error){show(msg,t("fail")+error.message,"err");return;}
    const u=users.find(x=>x.boss_id===id); Object.assign(u,vals);
    show(msg,t("updated"),"ok"); setTimeout(()=>renderUsers(),700);
  }
  $("search").oninput=renderUsers;

  render();
</script>
</body>
</html>
